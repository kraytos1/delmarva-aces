<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Box Score · Delmarva Aces</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#E8530A"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap');
:root{
  --orange:#E8530A;--og:rgba(232,83,10,.15);
  --black:#0A0C0E;--dark:#111418;--dark2:#181C22;--dark3:#1F242C;
  --bdr:rgba(255,255,255,.08);--bdr-a:rgba(232,83,10,.4);
  --text:#F0EDE8;--muted:#7A8290;--green:#3DDC6A;
  --mono:'Roboto Mono',monospace;--display:'Oswald',sans-serif;--body:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--text);font-family:var(--body);min-height:100vh;}

nav{background:rgba(10,12,14,.95);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;position:sticky;top:0;z-index:50;}
.nav-brand{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
.nav-logo{width:32px;height:32px;background:var(--orange);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:17px;font-weight:700;color:white;}
.nav-name{font-family:var(--display);font-size:15px;font-weight:600;color:var(--text);}
.nav-name span{color:var(--orange);}
.nav-back{font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;}

/* HEADER */
.game-header{background:var(--dark2);border-bottom:1px solid var(--bdr);padding:20px 24px;}
.game-header-inner{max-width:900px;margin:0 auto;}
.game-date{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;}
.game-matchup{display:flex;align-items:center;gap:0;margin-bottom:8px;}
.gm-team{flex:1;}
.gm-team.away{text-align:left;}
.gm-team.home{text-align:right;}
.gm-name{font-family:var(--display);font-size:14px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.gm-score{font-family:var(--display);font-size:52px;font-weight:700;line-height:1;color:var(--text);}
.gm-score.win{color:var(--orange);}
.gm-sep{font-family:var(--display);font-size:28px;color:var(--muted);padding:0 16px;}
.game-meta{font-family:var(--mono);font-size:11px;color:var(--muted);}
.result-badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;letter-spacing:.5px;margin-left:8px;}
.result-w{background:rgba(61,220,106,.12);color:var(--green);border:1px solid rgba(61,220,106,.3);}
.result-l{background:rgba(231,76,60,.1);color:#e74c3c;border:1px solid rgba(231,76,60,.3);}

/* LINE SCORE */
.content{max-width:900px;margin:0 auto;padding:20px 24px;}
.section{margin-bottom:28px;}
.section-title{font-family:var(--display);font-size:16px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px;color:var(--text);}
.section-title::after{content:'';flex:1;height:1px;background:var(--bdr);}

/* LINE SCORE TABLE */
.linescore-wrap{overflow-x:auto;}
.linescore{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;}
.linescore th{background:var(--dark3);color:var(--muted);font-weight:500;padding:7px 10px;text-align:center;border-bottom:1px solid var(--bdr);white-space:nowrap;}
.linescore th.team-col{text-align:left;width:140px;}
.linescore td{padding:8px 10px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04);}
.linescore td.team-col{text-align:left;font-family:var(--display);font-size:13px;font-weight:600;}
.linescore td.total{font-weight:700;color:var(--orange);background:var(--dark2);}
.linescore td.total.lead{color:var(--orange);}
.linescore tr:last-child td{border-bottom:none;}
.linescore .sep{border-left:1px solid var(--bdr);}
.inn-cell{min-width:28px;}
.inn-cell.scored{color:var(--text);}
.inn-cell.zero{color:var(--muted);}

/* BOX SCORE TABLE */
.box-table-wrap{overflow-x:auto;}
.box-table{width:100%;border-collapse:collapse;font-size:12px;}
.box-table th{background:var(--dark3);color:var(--muted);font-family:var(--mono);font-size:10px;font-weight:500;padding:7px 8px;text-align:center;border-bottom:1px solid var(--bdr);white-space:nowrap;letter-spacing:.5px;}
.box-table th.player-col{text-align:left;min-width:160px;}
.box-table td{padding:7px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04);font-family:var(--mono);font-size:12px;}
.box-table td.player-col{text-align:left;}
.box-table tr:last-child td{border-bottom:none;}
.box-table tr:hover td{background:rgba(255,255,255,.02);}
.player-link{text-decoration:none;color:var(--text);font-size:13px;font-weight:500;font-family:var(--body);}
.player-link:hover{color:var(--orange);}
.pos-tag{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:4px;}
.box-table td.hi{color:var(--orange);font-weight:600;}
.box-table tfoot td{background:var(--dark2);color:var(--muted);font-size:11px;border-top:1px solid var(--bdr);}
.box-table tfoot td.total-lbl{text-align:left;color:var(--text);font-weight:600;}

/* PITCHING TABLE */
.pitch-table{width:100%;border-collapse:collapse;font-size:12px;}
.pitch-table th{background:var(--dark3);color:var(--muted);font-family:var(--mono);font-size:10px;font-weight:500;padding:7px 8px;text-align:center;border-bottom:1px solid var(--bdr);letter-spacing:.5px;}
.pitch-table th.player-col{text-align:left;min-width:160px;}
.pitch-table td{padding:7px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04);font-family:var(--mono);font-size:12px;}
.pitch-table td.player-col{text-align:left;}
.pitch-table tr:last-child td{border-bottom:none;}
.pitch-table tr:hover td{background:rgba(255,255,255,.02);}
.era-good{color:var(--green);}
.era-bad{color:#e74c3c;}

/* NO DATA */
.no-data{background:var(--dark2);border:1px dashed var(--bdr);border-radius:10px;padding:32px;text-align:center;}
.no-data-icon{font-size:32px;opacity:.3;margin-bottom:10px;}
.no-data-text{font-family:var(--mono);font-size:12px;color:var(--muted);line-height:1.8;}

/* PLAY BY PLAY */
.pbp-list{display:flex;flex-direction:column;gap:0;}
.pbp-item{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);display:grid;grid-template-columns:60px 80px 1fr;gap:12px;align-items:center;}
.pbp-inn{font-family:var(--mono);font-size:10px;color:var(--muted);}
.pbp-result{font-family:var(--mono);font-size:11px;}
.pbp-hit{color:var(--green);}
.pbp-out{color:var(--muted);}
.pbp-score{color:var(--orange);}
.pbp-desc{font-size:12px;color:var(--text);}

.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px;}
.loading-logo{font-family:var(--display);font-size:40px;font-weight:700;color:var(--orange);}
.loading-text{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">
    <div class="nav-logo">A</div>
    <span class="nav-name">Delmarva <span>Aces</span></span>
  </a>
  <a class="nav-back" href="/">← Schedule</a>
</nav>

<div id="loading" class="loading">
  <div class="loading-logo">A</div>
  <div class="loading-text">Loading box score...</div>
</div>

<div id="main" style="display:none;">

  <!-- GAME HEADER -->
  <div class="game-header">
    <div class="game-header-inner">
      <div class="game-date" id="g-date"></div>
      <div class="game-matchup">
        <div class="gm-team away">
          <div class="gm-name">Delmarva Aces</div>
          <div class="gm-score" id="g-us">0</div>
        </div>
        <div class="gm-sep">–</div>
        <div class="gm-team home">
          <div class="gm-name" id="g-opp-name">Opponent</div>
          <div class="gm-score" id="g-them">0</div>
        </div>
      </div>
      <div class="game-meta" id="g-meta"></div>
    </div>
  </div>

  <div class="content">

    <!-- LINE SCORE -->
    <div class="section">
      <div class="section-title">Line Score</div>
      <div class="linescore-wrap">
        <table class="linescore">
          <thead>
            <tr>
              <th class="team-col">Team</th>
              <tbody id="inning-headers"></tbody>
              <th class="sep">R</th><th>H</th><th>E</th>
            </tr>
          </thead>
          <tbody id="linescore-body"></tbody>
        </table>
      </div>
    </div>

    <!-- ACES BATTING -->
    <div class="section">
      <div class="section-title">Aces Batting</div>
      <div id="aces-batting-wrap">
        <div class="no-data">
          <div class="no-data-icon">⚾</div>
          <div class="no-data-text">Batting data available once live games are fully scored</div>
        </div>
      </div>
    </div>

    <!-- ACES PITCHING -->
    <div class="section" id="pitching-section">
      <div class="section-title">Aces Pitching</div>
      <div id="aces-pitching-wrap">
        <div class="no-data">
          <div class="no-data-icon">⚾</div>
          <div class="no-data-text">Pitching data available once live games are fully scored</div>
        </div>
      </div>
    </div>

    <!-- PLAY BY PLAY -->
    <div class="section">
      <div class="section-title">Play by Play</div>
      <div id="pbp-wrap">
        <div class="no-data">
          <div class="no-data-icon">📋</div>
          <div class="no-data-text">Play-by-play available for scored games</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
var db = supabase.createClient(ACES_CONFIG.supabaseUrl, ACES_CONFIG.supabaseKey)

var gameId = window.location.pathname.split('/').pop()
var game = null
var players = {}
var atBats = []
var pitches = []

async function init() {
  if (!gameId) { showError(); return }

  // Load game
  try {
    var {data:g} = await db.from('games').select('*,opponents(name)').eq('id',gameId).single()
    if (!g) { showError(); return }
    game = g
    renderHeader(g)
  } catch(e) { showError(); return }

  // Load players (for name lookup)
  try {
    var {data:pl} = await db.from('players').select('id,jersey_num,first_name,last_name,positions')
    if (pl) pl.forEach(function(p){ players[p.id] = p })
  } catch(e) {}

  // Load at-bats
  try {
    var {data:ab} = await db.from('at_bats').select('*').eq('game_id',gameId).order('ab_num')
    if (ab) atBats = ab
  } catch(e) {}

  // Load pitches
  try {
    var {data:p} = await db.from('pitches').select('*').eq('game_id',gameId).order('pitch_num')
    if (p) pitches = p
  } catch(e) {}

  renderLineScore()
  renderBatting()
  renderPitching()
  renderPBP()

  document.getElementById('loading').style.display = 'none'
  document.getElementById('main').style.display = 'block'
  document.title = 'Aces vs '+(game.opponents?.name||'Opponent')+' · Box Score'
}

function renderHeader(g) {
  var opp = g.opponents?.name || 'Opponent'
  var us = g.our_score || 0, them = g.opp_score || 0
  var won = us > them

  var d = new Date(g.game_date)
  var ds = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric',timeZone:'UTC'})
  setText('g-date', ds + (g.tournament ? ' · ' + g.tournament : ''))
  setText('g-opp-name', opp)
  setText('g-us', us)
  setText('g-them', them)
  document.getElementById('g-us').className   = 'gm-score' + (won ? ' win' : '')
  document.getElementById('g-them').className = 'gm-score' + (!won && them>us ? ' win' : '')

  var statusLabel = g.status === 'final' ? 'Final' : g.status === 'live' ? 'Live' : 'Scheduled'
  var resultBadge = g.status === 'final'
    ? '<span class="result-badge '+(won?'result-w':'result-l')+'">'+(won?'W':'L')+'</span>'
    : ''
  var innings = g.inning ? ' · ' + g.inning + ' inn' : ''
  setText('g-meta', statusLabel + innings)
  document.getElementById('g-meta').innerHTML = statusLabel + innings + resultBadge
}

function renderLineScore() {
  if (!atBats.length) return

  var maxInning = Math.max.apply(null, atBats.map(function(ab){return ab.inning||1}))
  maxInning = Math.max(maxInning, game.inning || 7)

  // Build inning run totals
  var acesRuns   = {}, oppRuns = {}
  var acesHits   = 0,  oppHits = 0
  atBats.forEach(function(ab) {
    var inn = ab.inning || 1
    var runs = ab.runs_scored || 0
    var isHit = ['single','double','triple','home_run'].includes(ab.result)
    if (ab.half === 'top') {
      acesRuns[inn] = (acesRuns[inn]||0) + runs
      if (isHit) acesHits++
    } else {
      oppRuns[inn] = (oppRuns[inn]||0) + runs
      if (isHit) oppHits++
    }
  })

  // Headers
  var hdrs = ''
  for (var i=1; i<=maxInning; i++) hdrs += '<th class="inn-cell">'+i+'</th>'
  document.getElementById('inning-headers').innerHTML = hdrs

  // Rows
  var acesRow = '<tr><td class="team-col">Delmarva Aces</td>'
  var oppRow  = '<tr><td class="team-col">'+(game.opponents?.name||'Opponent')+'</td>'
  for (var i=1; i<=maxInning; i++) {
    var ar = acesRuns[i] !== undefined ? acesRuns[i] : (i <= (game.inning||0) ? '0' : '—')
    var or = oppRuns[i]  !== undefined ? oppRuns[i]  : (i <= (game.inning||0) ? '0' : '—')
    var ac = ar > 0 ? 'inn-cell scored' : 'inn-cell zero'
    var oc = or > 0 ? 'inn-cell scored' : 'inn-cell zero'
    acesRow += '<td class="'+ac+'">'+ar+'</td>'
    oppRow  += '<td class="'+oc+'">'+or+'</td>'
  }
  acesRow += '<td class="total sep">'+(game.our_score||0)+'</td><td class="total">'+acesHits+'</td><td class="total">0</td></tr>'
  oppRow  += '<td class="total sep">'+(game.opp_score||0)+'</td><td class="total">'+oppHits+'</td><td class="total">0</td></tr>'
  document.getElementById('linescore-body').innerHTML = acesRow + oppRow
}

function renderBatting() {
  // Only show Aces batters (top half, has batter_id)
  var acesABs = atBats.filter(function(ab){ return ab.half === 'top' && ab.batter_id })
  if (!acesABs.length) return

  // Aggregate per batter in order of first appearance
  var batterOrder = []
  var batterStats = {}
  acesABs.forEach(function(ab) {
    var pid = ab.batter_id
    if (!batterStats[pid]) {
      batterOrder.push(pid)
      batterStats[pid] = {ab:0,h:0,r:0,rbi:0,bb:0,so:0,lob:0}
    }
    var s = batterStats[pid]
    var result = ab.result || ''
    var isHit = ['single','double','triple','home_run'].includes(result)
    var isWalk = ['walk','intentional_walk','hbp'].includes(result)
    var isK = ['strikeout_looking','strikeout_swinging'].includes(result)
    if (!isWalk) s.ab++
    if (isHit) s.h++
    if (isWalk) s.bb++
    if (isK) s.so++
    s.rbi += ab.rbi || 0
    s.r   += ab.runs_scored || 0
  })

  // Totals
  var totals = {ab:0,h:0,r:0,rbi:0,bb:0,so:0}
  Object.values(batterStats).forEach(function(s){
    totals.ab+=s.ab;totals.h+=s.h;totals.r+=s.r;totals.rbi+=s.rbi;totals.bb+=s.bb;totals.so+=s.so
  })

  var html = '<div class="box-table-wrap"><table class="box-table">'
  html += '<thead><tr>'
  html += '<th class="player-col">Batter</th>'
  html += '<th>AB</th><th>R</th><th>H</th><th>RBI</th><th>BB</th><th>K</th><th>AVG</th>'
  html += '</tr></thead><tbody>'

  batterOrder.forEach(function(pid) {
    var p = players[pid]
    var s = batterStats[pid]
    var avg = s.ab > 0 ? (s.h/s.ab).toFixed(3).replace('0.','.')  : '—'
    var name = p ? p.first_name+' '+p.last_name : 'Unknown'
    var pos  = p ? (p.positions||[])[0] || '' : ''
    var num  = p ? p.jersey_num : ''
    html += '<tr>'
    html += '<td class="player-col"><a class="player-link" href="/player/'+num+'">'
    html += '#'+num+' '+name+'</a><span class="pos-tag">'+pos+'</span></td>'
    html += td(s.ab)+td(s.r,s.r>0)+td(s.h,s.h>0)+td(s.rbi,s.rbi>0)+td(s.bb)+td(s.so)
    html += '<td>'+(s.ab>0?avg:'—')+'</td>'
    html += '</tr>'
  })

  html += '</tbody><tfoot><tr>'
  html += '<td class="total-lbl">Totals</td>'
  html += '<td>'+totals.ab+'</td><td>'+totals.r+'</td><td>'+totals.h+'</td>'
  html += '<td>'+totals.rbi+'</td><td>'+totals.bb+'</td><td>'+totals.so+'</td><td>—</td>'
  html += '</tr></tfoot></table></div>'

  document.getElementById('aces-batting-wrap').innerHTML = html
}

function renderPitching() {
  // Only pitches with pitcher_id (Aces pitching = bottom half)
  var acesPitches = pitches.filter(function(p){ return p.pitcher_id })
  if (!acesPitches.length) return

  // Aggregate per pitcher
  var pitcherOrder = []
  var pitcherStats = {}
  var bottomABs = atBats.filter(function(ab){ return ab.half === 'bottom' })

  acesPitches.forEach(function(p) {
    var pid = p.pitcher_id
    if (!pitcherStats[pid]) {
      pitcherOrder.push(pid)
      pitcherStats[pid] = {np:0,h:0,r:0,er:0,bb:0,so:0,outs:0}
    }
    var s = pitcherStats[pid]
    s.np++
    if (p.result==='ball') s.bb++ // approximate — proper walk tracking via at_bats
  })

  // Get hits/runs from bottom-half at-bats
  bottomABs.forEach(function(ab) {
    // Assign to last pitcher who threw (simplified)
    var lastPid = pitcherOrder[pitcherOrder.length-1]
    if (!lastPid) return
    var s = pitcherStats[lastPid]
    var result = ab.result || ''
    if (['single','double','triple','home_run'].includes(result)) s.h++
    if (['strikeout_looking','strikeout_swinging'].includes(result)) {s.so++;s.outs++}
    if (['groundout','flyout','lineout','popout','sac_fly','sac_bunt'].includes(result)) s.outs++
    if (result==='double_play') s.outs+=2
    s.r += ab.runs_scored || 0
    s.er += ab.runs_scored || 0 // simplified — no unearned run tracking yet
  })

  var html = '<div class="box-table-wrap"><table class="pitch-table">'
  html += '<thead><tr>'
  html += '<th class="player-col">Pitcher</th>'
  html += '<th>IP</th><th>H</th><th>R</th><th>ER</th><th>BB</th><th>K</th><th>NP</th><th>ERA</th>'
  html += '</tr></thead><tbody>'

  pitcherOrder.forEach(function(pid) {
    var p = players[pid]
    var s = pitcherStats[pid]
    var ip = Math.floor(s.outs/3)+'.'+(s.outs%3)
    var era = s.outs > 0 ? (s.er / (s.outs/3) * 9).toFixed(2) : '—'
    var eraClass = parseFloat(era) < 2.0 ? 'era-good' : parseFloat(era) > 5.0 ? 'era-bad' : ''
    var name = p ? p.first_name+' '+p.last_name : 'Unknown'
    var num  = p ? p.jersey_num : ''
    html += '<tr>'
    html += '<td class="player-col"><a class="player-link" href="/player/'+num+'">#'+num+' '+name+'</a></td>'
    html += '<td>'+ip+'</td><td>'+s.h+'</td><td>'+s.r+'</td><td>'+s.er+'</td>'
    html += '<td>'+s.bb+'</td><td>'+s.so+'</td><td>'+s.np+'</td>'
    html += '<td class="'+eraClass+'">'+era+'</td>'
    html += '</tr>'
  })

  html += '</tbody></table></div>'
  document.getElementById('aces-pitching-wrap').innerHTML = html
}

function renderPBP() {
  if (!atBats.length) return

  var html = '<div class="pbp-list">'
  atBats.forEach(function(ab) {
    var inn = (ab.half==='top'?'Top ':'Bot ')+(ab.inning||'?')
    var result = (ab.result||'').replace(/_/g,' ')
    var isHit = ['single','double','triple','home_run','walk','hbp'].includes(ab.result)
    var isScore = (ab.runs_scored||0) > 0
    var rClass = isScore ? 'pbp-score' : isHit ? 'pbp-hit' : 'pbp-out'

    var pid = ab.batter_id
    var p = pid ? players[pid] : null
    var name = p ? p.first_name[0]+'. '+p.last_name : (ab.half==='bottom' ? 'Opp.' : '—')

    var desc = name + ' — ' + result
    if (ab.rbi > 0) desc += ' ('+ab.rbi+' RBI)'
    if (isScore) desc += ' · '+ab.runs_scored+' run'+(ab.runs_scored>1?'s':'')+' score'

    html += '<div class="pbp-item">'
    html += '<span class="pbp-inn">'+inn+'</span>'
    html += '<span class="pbp-result '+rClass+'">'+result+'</span>'
    html += '<span class="pbp-desc">'+desc+'</span>'
    html += '</div>'
  })
  html += '</div>'
  document.getElementById('pbp-wrap').innerHTML = html
}

function td(val, hi) {
  return '<td'+(hi?' class="hi"':'')+'>'+val+'</td>'
}
function setText(id,val){var el=document.getElementById(id);if(el)el.textContent=val}
function showError(){
