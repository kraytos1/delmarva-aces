<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" href="/icon-192.png"/>
<meta name="theme-color" content="#E8530A"/>
<title>Bullpen · Delmarva Aces</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/config.js"></script>
<script src="/pin.js"></script>
<script src="/nav.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Roboto+Mono:wght@400;500&display=swap');
  :root{--orange:#E8530A;--orange-dim:#C44208;--og:rgba(232,83,10,.18);--black:#0A0C0E;--dark:#111418;--dark2:#181C22;--dark3:#1F242C;--bdr:rgba(255,255,255,.08);--bdr-a:rgba(232,83,10,.35);--text:#F0EDE8;--muted:#7A8290;--mono:'Roboto Mono',monospace;--display:'Oswald',sans-serif;--body:'Inter',sans-serif;--green:#3DDC6A;--red:#ef4444;--amber:#f59e0b;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--black);color:var(--text);font-family:var(--body);line-height:1.6;}
  h1,h2,h3{font-family:var(--display);font-weight:600;}
  a{color:inherit;}

  .wrap{max-width:1200px;margin:0 auto;padding:28px 28px 64px;}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--orange);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .eyebrow::before{content:'';width:20px;height:1px;background:var(--orange);}
  h1{font-size:clamp(34px,5vw,52px);line-height:1;letter-spacing:-1px;text-transform:uppercase;}
  h1 span{color:var(--orange);}
  .sub{font-size:14px;color:var(--muted);margin-top:10px;max-width:640px;}

  .legend{display:flex;flex-wrap:wrap;gap:16px;margin:20px 0 24px;font-family:var(--mono);font-size:11px;color:var(--muted);}
  .legend b{color:var(--text);font-weight:500;}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle;}
  .dot-g{background:var(--green);} .dot-r{background:var(--red);} .dot-a{background:var(--amber);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
  .card{background:var(--dark);border:1px solid var(--bdr);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--muted);}
  .card.avail::before{background:var(--green);}
  .card.rest::before{background:var(--red);}

  .p-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .p-name{font-family:var(--display);font-size:21px;font-weight:600;}
  .p-name em{color:var(--muted);font-style:normal;font-weight:400;font-size:15px;margin-right:6px;}
  .status{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;padding:4px 10px;border-radius:20px;white-space:nowrap;}
  .status.avail{background:rgba(61,220,106,.12);color:var(--green);border:1px solid rgba(61,220,106,.3);}
  .status.rest{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.3);}

  .rows{font-family:var(--mono);font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:3px;margin-bottom:12px;}
  .rows .r{display:flex;justify-content:space-between;gap:10px;}
  .rows .r b{color:var(--text);font-weight:500;font-family:var(--body);}
  .rows .r .hot{color:var(--orange);}

  .velo{border-top:1px solid var(--bdr);padding-top:12px;margin-top:4px;}
  .velo-top{display:flex;align-items:flex-end;gap:16px;margin-bottom:8px;}
  .velo-big{font-family:var(--display);font-size:32px;font-weight:700;color:var(--orange);line-height:1;}
  .velo-big small{font-family:var(--mono);font-size:11px;color:var(--muted);font-weight:400;margin-left:3px;}
  .velo-sub{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .spark{display:block;width:100%;height:40px;margin-top:4px;}
  .spark-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}

  .empty{text-align:center;padding:70px 24px;border:1px dashed var(--bdr);border-radius:14px;background:var(--dark);}
  .empty-ico{font-size:44px;margin-bottom:14px;}
  .empty h2{font-size:22px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
  .empty p{color:var(--muted);font-size:14px;max-width:460px;margin:0 auto;}
  .note{text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px;padding:50px 0;}
</style>
</head>
<body>
<div id="site-nav"></div>

<div class="wrap">
  <div class="eyebrow">Pitching Staff</div>
  <h1>Bull<span>pen</span></h1>
  <div class="sub" id="sub">Loading arm-care status &amp; velocity…</div>

  <div class="legend" id="legend" style="display:none;">
    <span><span class="dot dot-g"></span><b>Available</b> — rest requirement met</span>
    <span><span class="dot dot-r"></span><b>Resting</b> — needs more days off</span>
    <span>Rest rule (13U): <b>1–20</b> P = 0d · <b>21–35</b> = 1d · <b>36–50</b> = 2d · <b>51–65</b> = 3d · <b>66+</b> = 4d</span>
  </div>

  <div id="content"><div class="note">Loading…</div></div>
</div>

<script>
var db = supabase.createClient(ACES_CONFIG.supabaseUrl, ACES_CONFIG.supabaseKey);

// Pitch Smart daily rest guidelines (13U/14U; same thresholds for 11–12, daily max differs).
var DAILY_MAX = 95;
function restDaysRequired(p){ return p>=66?4 : p>=51?3 : p>=36?2 : p>=21?1 : 0; }

function fmtDate(d){ return d ? new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : ''; }
function daysAgoLabel(n){ return n<=0?'today' : n===1?'1 day ago' : n+' days ago'; }

// tiny SVG sparkline of per-game values
function sparkline(vals){
  vals = vals.filter(function(v){return v!=null;});
  if(vals.length<2) return '';
  var w=280, h=40, pad=4;
  var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals);
  var rng=(mx-mn)||1;
  var pts=vals.map(function(v,i){
    var x=pad + i*((w-2*pad)/(vals.length-1));
    var y=h-pad - ((v-mn)/rng)*(h-2*pad);
    return x.toFixed(1)+','+y.toFixed(1);
  });
  var last=pts[pts.length-1].split(',');
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'
    + '<polyline fill="none" stroke="#E8530A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="'+pts.join(' ')+'"/>'
    + '<circle cx="'+last[0]+'" cy="'+last[1]+'" r="3" fill="#E8530A"/></svg>';
}

function card(p){
  var statusCls = p.available ? 'avail' : 'rest';
  var statusTxt = p.available ? '● Available'
    : '● Resting · ' + p.daysLeft + 'd left';
  var restMet = p.available ? 'met' : ('need '+p.restReq+'d');
  var availOn = p.available ? '' : (' · back '+fmtDate(addDays(p.last.date, p.restReq)));
  var last = p.last;
  var veloBlock = (p.maxVelo!=null)
    ? '<div class="velo">'
      + '<div class="velo-top"><div class="velo-big">'+p.maxVelo+'<small>MPH TOP</small></div>'
      + '<div class="velo-sub">avg '+(p.avgVelo!=null?p.avgVelo:'—')+' mph<br>last game '+(last.avgVelo!=null?last.avgVelo+' avg':'—')+'</div></div>'
      + '<div class="spark-lbl">Velocity by game (avg)</div>'
      + (sparkline(p.games.map(function(g){return g.avgVelo;})) || '<div class="velo-sub">need 2+ games for trend</div>')
      + '</div>'
    : '<div class="velo"><div class="velo-sub">No velocity readings logged yet.</div></div>';

  return '<div class="card '+statusCls+'">'
    + '<div class="p-head"><div class="p-name">'+(p.num!=null?'<em>#'+p.num+'</em>':'')+p.name+'</div>'
    +   '<span class="status '+statusCls+'">'+statusTxt+'</span></div>'
    + '<div class="rows">'
    +   '<div class="r"><span>Last outing</span><b>'+last.count+' P · '+fmtDate(last.date)+' ('+daysAgoLabel(p.daysSince)+')</b></div>'
    +   '<div class="r"><span>vs</span><b>'+last.opp+'</b></div>'
    +   '<div class="r"><span>Rest requirement</span><b class="'+(p.available?'':'hot')+'">'+p.restReq+' day'+(p.restReq===1?'':'s')+' · '+restMet+availOn+'</b></div>'
    +   '<div class="r"><span>Season workload</span><b>'+p.appearances+' app · '+p.totalPitches+' P · '+Math.round(p.totalPitches/p.appearances)+' avg</b></div>'
    + '</div>'
    + veloBlock
    + '</div>';
}

function addDays(dateStr, n){
  var d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0];
}

async function init(){
  try{
    var {data,error} = await db.from('pitches')
      .select('pitcher_id, velocity_mph, game_id, players!pitcher_id(first_name,last_name,jersey_num), games(game_date, opponents(name))')
      .not('pitcher_id','is',null);
    if(error) throw error;

    var byP = {};
    (data||[]).forEach(function(p){
      if(!p.players || !p.games || !p.games.game_date) return;
      var o = byP[p.pitcher_id] || (byP[p.pitcher_id]={num:p.players.jersey_num, name:(p.players.first_name+' '+p.players.last_name).trim(), games:{}});
      var g = o.games[p.game_id] || (o.games[p.game_id]={date:p.games.game_date, opp:(p.games.opponents&&p.games.opponents.name)||'opponent', count:0, velos:[]});
      g.count++;
      if(p.velocity_mph!=null) g.velos.push(p.velocity_mph);
    });

    var pitchers = Object.keys(byP).map(function(pid){
      var o=byP[pid];
      var gArr=Object.keys(o.games).map(function(k){return o.games[k];}).sort(function(a,b){return a.date<b.date?-1:1;});
      gArr.forEach(function(g){
        g.avgVelo = g.velos.length ? Math.round(g.velos.reduce(function(a,b){return a+b;},0)/g.velos.length) : null;
        g.maxVelo = g.velos.length ? Math.max.apply(null,g.velos) : null;
      });
      var allVelos=[]; gArr.forEach(function(g){ allVelos=allVelos.concat(g.velos); });
      var last=gArr[gArr.length-1];
      var totalPitches=gArr.reduce(function(a,g){return a+g.count;},0);
      var req=restDaysRequired(last.count);
      var daysSince=Math.floor((Date.now()-new Date(last.date+'T00:00:00').getTime())/86400000);
      return { num:o.num, name:o.name, games:gArr, appearances:gArr.length, totalPitches:totalPitches,
        last:last, restReq:req, daysSince:daysSince, available:(daysSince>=req), daysLeft:Math.max(0,req-daysSince),
        maxVelo: allVelos.length?Math.max.apply(null,allVelos):null,
        avgVelo: allVelos.length?Math.round(allVelos.reduce(function(a,b){return a+b;},0)/allVelos.length):null };
    });

    if(!pitchers.length){
      document.getElementById('sub').textContent = 'Arm-care availability and velocity trends for the Aces pitching staff.';
      document.getElementById('content').innerHTML =
        '<div class="empty"><div class="empty-ico">⚾</div><h2>No pitching data yet</h2>'
        + '<p>As you score games, each pitcher\'s workload, rest status, and velocity trend show up here automatically.</p></div>';
      return;
    }
    // resting first (coach needs to see who is unavailable), then available; heaviest rest first
    pitchers.sort(function(a,b){ if(a.available!==b.available) return a.available?1:-1; return b.daysLeft-a.daysLeft || b.totalPitches-a.totalPitches; });

    var avail=pitchers.filter(function(p){return p.available;}).length;
    document.getElementById('sub').textContent = pitchers.length+' pitchers · '+avail+' available today';
    document.getElementById('legend').style.display = 'flex';
    document.getElementById('content').innerHTML = '<div class="grid">'+pitchers.map(card).join('')+'</div>';
  }catch(e){
    document.getElementById('sub').textContent='';
    document.getElementById('content').innerHTML = '<div class="note">Couldn\'t load bullpen: '+(e.message||e)+'</div>';
  }
}
init();
</script>
</body>
</html>
