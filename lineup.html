<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Aces Scorer"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <meta name="theme-color" content="#E8530A"/>
<title>Aces · Lineup</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="/pin.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap');
:root{
  --orange:#E8530A;--og:rgba(232,83,10,.15);
  --black:#0A0C0E;--dark:#111418;--dark2:#181C22;--dark3:#1F242C;
  --bdr:rgba(255,255,255,.08);--bdr-a:rgba(232,83,10,.4);
  --text:#F0EDE8;--muted:#7A8290;--green:#3DDC6A;
  --mono:'Roboto Mono',monospace;--display:'Oswald',sans-serif;--body:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--black);color:var(--text);font-family:var(--body);}

/* NAV */
nav{background:#0d1420;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:50px;position:sticky;top:0;z-index:50;}
.nav-logo{font-family:var(--display);font-size:15px;font-weight:700;color:var(--orange);}
.nav-title{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px;}
.nav-save{background:var(--orange);color:white;border:none;border-radius:7px;padding:7px 16px;font-family:var(--display);font-size:13px;font-weight:600;cursor:pointer;}
.nav-save:active{opacity:.8;}

/* GAME SELECTOR */
.game-bar{background:var(--dark2);border-bottom:1px solid var(--bdr);padding:10px 16px;display:flex;align-items:center;gap:10px;}
.game-sel{flex:1;background:var(--dark3);border:1px solid var(--bdr);border-radius:7px;padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--body);outline:none;appearance:none;}
.game-sel:focus{border-color:var(--orange);}
.go-score{background:var(--dark3);border:1px solid var(--bdr-a);color:var(--orange);border-radius:7px;padding:8px 14px;font-family:var(--mono);font-size:11px;cursor:pointer;white-space:nowrap;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bdr);background:var(--dark2);}
.tab{flex:1;padding:11px 4px;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;text-align:center;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);background:none;border-top:none;border-left:none;border-right:none;}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);}

/* LINEUP LIST */
.lineup-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.lineup-row{background:var(--dark2);border:1px solid var(--bdr);border-radius:10px;display:flex;align-items:center;gap:10px;padding:10px 12px;position:relative;}
.lineup-row.dragging{opacity:.5;}
.order-num{font-family:var(--display);font-size:20px;font-weight:700;color:var(--orange);min-width:28px;text-align:center;}
.player-sel{flex:1;background:var(--dark3);border:1px solid var(--bdr);border-radius:7px;padding:8px 10px;color:var(--text);font-size:13px;font-family:var(--body);outline:none;appearance:none;}
.player-sel:focus{border-color:var(--orange);}
.pos-sel{width:62px;background:var(--dark3);border:1px solid var(--bdr);border-radius:7px;padding:8px 6px;color:var(--text);font-size:12px;font-family:var(--mono);outline:none;appearance:none;text-align:center;}
.pos-sel:focus{border-color:var(--orange);}
.row-del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 6px;line-height:1;}
.row-del:active{color:#e74c3c;}
.drag-handle{color:var(--muted);font-size:16px;cursor:grab;padding:4px 2px;user-select:none;}

/* ADD BATTER BUTTON */
.add-btn{margin:4px 16px 16px;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1.5px dashed var(--bdr-a);border-radius:10px;background:transparent;color:var(--orange);font-family:var(--mono);font-size:12px;cursor:pointer;letter-spacing:.5px;}
.add-btn:active{background:var(--og);}

/* PITCHER SECTION */
.section-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:14px 16px 6px;}
.pitcher-row{margin:0 16px 8px;background:var(--dark2);border:1px solid var(--bdr-a);border-radius:10px;padding:12px;display:flex;align-items:center;gap:10px;}
.pitcher-badge{background:var(--orange);color:white;font-family:var(--display);font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;flex-shrink:0;}

/* OPPONENT TAB */
.opp-section{padding:12px 16px;}
.opp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.opp-title{font-family:var(--display);font-size:16px;font-weight:600;}
.opp-inp{width:100%;background:var(--dark3);border:1px solid var(--bdr);border-radius:7px;padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--body);outline:none;margin-bottom:8px;}
.opp-inp:focus{border-color:var(--orange);}
.opp-row{background:var(--dark2);border:1px solid var(--bdr);border-radius:10px;display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:8px;}

/* SUB MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--dark2);border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;}
.modal-title{font-family:var(--display);font-size:17px;font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;}
.modal-close{font-size:20px;cursor:pointer;color:var(--muted);background:none;border:none;}
.sub-option{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--bdr);border-radius:9px;margin-bottom:8px;cursor:pointer;background:var(--dark3);}
.sub-option:active{background:var(--dark2);}
.sub-num{font-family:var(--display);font-size:18px;font-weight:700;color:var(--orange);min-width:28px;}
.sub-name{font-size:14px;font-weight:500;}
.sub-pos{font-family:var(--mono);font-size:11px;color:var(--muted);}
.sub-badge{margin-left:auto;font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(232,83,10,.15);color:var(--orange);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2332;border:1px solid var(--orange);color:var(--orange);padding:8px 20px;border-radius:20px;font-family:var(--mono);font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<nav>
  <div>
    <div style="display:flex;align-items:center;gap:8px;"><img src="/logo.png" alt="Aces" style="width:32px;height:32px;object-fit:contain;"/><span style="font-family:var(--display);font-size:14px;font-weight:600;color:var(--orange);">Lineup</span></div>
  </div>
  <span class="nav-title" id="nav-game-name">No game selected</span>
  <button class="nav-save" onclick="saveLineup()">Save ✓</button>
</nav>

<div class="game-bar">
  <select class="game-sel" id="game-sel" onchange="loadLineup()">
    <option value="">Select game...</option>
  </select>
  <button class="go-score" onclick="goToScorer()">Score →</button>
  <button class="go-score" onclick="openNewGame()" style="background:var(--dark2);border-color:var(--orange);color:var(--orange);">+ New</button>
</div>

<!-- NEW GAME MODAL -->
<div class="modal-bg" id="new-game-modal" style="display:none;" onclick="closeNewGame(event)">
  <div class="modal" onclick="event.stopPropagation()" style="max-height:90vh;overflow-y:auto;">
    <div class="modal-title">
      <span>New Game</span>
      <button class="modal-close" onclick="closeNewGame()">×</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <div class="field-lbl" style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;">Opponent</div>
        <input class="opp-inp" id="ng-opp" placeholder="e.g. Ohio Valley Xpress" style="margin:0;width:100%;"/>
        <div id="ng-opp-suggestions" style="margin-top:4px;"></div>
      </div>
      <div>
        <div class="field-lbl" style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;">Date</div>
        <input class="opp-inp" id="ng-date" type="date" style="margin:0;width:100%;color:var(--text);"/>
      </div>
      <div>
        <div class="field-lbl" style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;">Tournament / Event</div>
        <input class="opp-inp" id="ng-tournament" placeholder="e.g. PG World Series" style="margin:0;width:100%;"/>
      </div>
      <div>
        <div class="field-lbl" style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;">Location</div>
        <input class="opp-inp" id="ng-location" placeholder="e.g. Cooperstown, NY" style="margin:0;width:100%;"/>
      </div>
      <div style="display:flex;gap:10px;">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;flex:1;background:var(--dark3);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;">
          <input type="radio" name="ng-homeway" value="home" checked style="accent-color:var(--orange);"/> Home
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;flex:1;background:var(--dark3);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;">
          <input type="radio" name="ng-homeway" value="away" style="accent-color:var(--orange);"/> Away
        </label>
      </div>
      <button onclick="createGame()" style="background:var(--orange);color:white;border:none;border-radius:10px;padding:14px;font-family:var(--display);font-size:16px;font-weight:600;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;">
        ⚾ Create Game
      </button>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-aces" onclick="switchTab('aces')">Aces Lineup</button>
  <button class="tab" id="tab-opp"  onclick="switchTab('opp')">Opponent</button>
  <button class="tab" id="tab-subs" onclick="switchTab('subs')">Subs Log</button>
</div>

<!-- ACES TAB -->
<div id="pane-aces">
  <div class="section-label">Starting pitcher</div>
  <div class="pitcher-row">
    <span class="pitcher-badge">P</span>
    <select class="player-sel" id="starter-pitcher" style="flex:1;">
      <option value="">Select pitcher...</option>
    </select>
  </div>

  <div class="section-label">Batting order <span style="color:var(--orange);" id="batter-count"></span></div>
  <div class="lineup-list" id="lineup-list"></div>
  <button class="add-btn" onclick="addBatter()">+ Add batter</button>
</div>

<!-- OPPONENT TAB -->
<div id="pane-opp" style="display:none;">
  <div class="opp-section">
    <div class="section-label" style="padding-left:0;">Opponent pitcher</div>
    <input class="opp-inp" id="opp-pitcher" placeholder="Pitcher name & number (e.g. #12 Smith)"/>

    <div class="section-label" style="padding-left:0;margin-top:8px;">Opponent batting order</div>
    <div id="opp-list"></div>
    <button class="add-btn" onclick="addOppBatter()">+ Add opponent batter</button>
  </div>
</div>

<!-- SUBS LOG TAB -->
<div id="pane-subs" style="display:none;">
  <div class="section-label">Substitutions this game</div>
  <div id="subs-list" style="padding:0 16px;">
    <div style="color:var(--muted);font-family:var(--mono);font-size:12px;padding:20px 0;text-align:center;">No substitutions yet</div>
  </div>
  <div class="section-label" style="margin-top:16px;">Make a substitution</div>
  <div style="padding:0 16px 16px;display:flex;flex-direction:column;gap:8px;">
    <button class="add-btn" onclick="openSubModal('pinch-hit')" style="border-color:var(--bdr-a);">Pinch hitter</button>
    <button class="add-btn" onclick="openSubModal('pinch-run')" style="border-color:rgba(61,220,106,.3);color:var(--green);">Pinch runner</button>
    <button class="add-btn" onclick="openSubModal('pitching-change')" style="border-color:rgba(127,119,221,.3);color:#a09cf0;">Pitching change</button>
  </div>
</div>

<!-- SUB MODAL -->
<div class="modal-bg" id="sub-modal" style="display:none;" onclick="closeSubModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">
      <span id="sub-modal-title">Select player</span>
      <button class="modal-close" onclick="closeSubModal()">×</button>
    </div>
    <div id="sub-modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL      = ACES_CONFIG.supabaseUrl
var SUPABASE_ANON_KEY = ACES_CONFIG.supabaseKey
var db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

var POSITIONS = ['P','C','1B','2B','3B','SS','LF','CF','RF','DH','EH','PH','PR']
var roster = []
var gameId = null
var currentTab = 'aces'

// Lineup state
var acesLineup = []   // [{playerId, playerName, jerseyNum, position, battingOrder}]
var starterPitcherId = null
var oppLineup = []    // [{name, position, battingOrder}]
var oppPitcher = ''
var subsLog = []      // [{type, inning, out, in, time}]

async function init() {
  // Load roster
  var {data} = await db.from('players').select('id,jersey_num,first_name,last_name,positions')
    .order('jersey_num')
  if (data) { roster = data; populateRosterSelects() }

  // Load opponents for autocomplete
  var {data:oppsData} = await db.from('opponents').select('id,name').order('name')
  if (oppsData) window._opponents = oppsData

  await refreshGamesList()

  // Check URL param for game
  var params = new URLSearchParams(window.location.search)
  if (params.get('game')) {
    document.getElementById('game-sel').value = params.get('game')
    loadLineup()
  }
  if (!acesLineup.length) initDefaultLineup()
}

async function refreshGamesList() {
  var today = new Date(); today.setDate(today.getDate()-1)
  var {data:games} = await db.from('games').select('*')
    .in('status',['scheduled','live'])
    .gte('game_date', today.toISOString().split('T')[0])
    .order('game_date').limit(20)
  if (!games || !games.length) return

  // Load opponent names separately
  var oppIds = [...new Set(games.map(function(g){return g.opponent_id}).filter(Boolean))]
  var oppMap = {}
  if (oppIds.length) {
    var {data:opps} = await db.from('opponents').select('id,name').in('id', oppIds)
    if (opps) opps.forEach(function(o){ oppMap[o.id] = o.name })
  }

  var sel = document.getElementById('game-sel')
  var cur = sel.value
  sel.innerHTML = '<option value="">Select game...</option>' +
    games.map(function(g){
      var opp = oppMap[g.opponent_id] || 'Opponent'
      var d = new Date(g.game_date)
      var ds = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',timeZone:'UTC'})
      return '<option value="'+g.id+'">'+ds+' vs '+opp+'</option>'
    }).join('')
  if (cur) sel.value = cur
}

/* ── NEW GAME ── */
function openNewGame() {
  // Set today's date as default
  var today = new Date().toISOString().split('T')[0]
  document.getElementById('ng-date').value = today
  document.getElementById('ng-opp').value = ''
  document.getElementById('ng-tournament').value = ''
  document.getElementById('ng-location').value = ''
  document.getElementById('new-game-modal').style.display = 'flex'

  // Wire up opponent autocomplete
  document.getElementById('ng-opp').addEventListener('input', function(){
    var val = this.value.toLowerCase()
    var opps = window._opponents || []
    var matches = opps.filter(function(o){ return o.name.toLowerCase().includes(val) }).slice(0,5)
    var sug = document.getElementById('ng-opp-suggestions')
    if (!val || !matches.length) { sug.innerHTML = ''; return }
    sug.innerHTML = matches.map(function(o){
      return '<div onclick="selectOpp(\''+o.name+'\')" style="padding:8px 12px;background:var(--dark3);border:1px solid var(--bdr);border-radius:6px;margin-bottom:4px;cursor:pointer;font-size:13px;">'+o.name+'</div>'
    }).join('')
  })
}

function selectOpp(name) {
  document.getElementById('ng-opp').value = name
  document.getElementById('ng-opp-suggestions').innerHTML = ''
}

function closeNewGame(e) {
  if (!e || e.target.id === 'new-game-modal')
    document.getElementById('new-game-modal').style.display = 'none'
}

async function createGame() {
  var oppName    = document.getElementById('ng-opp').value.trim()
  var gameDate   = document.getElementById('ng-date').value
  var tournament = document.getElementById('ng-tournament').value.trim()
  var location   = document.getElementById('ng-location').value.trim()
  var isHome     = document.querySelector('input[name="ng-homeway"]:checked').value === 'home'

  if (!oppName) { showToast('Enter opponent name'); return }
  if (!gameDate) { showToast('Pick a date'); return }

  showToast('Creating game...')

  try {
    // Find or create opponent
    var oppId
    try {
      var {data:existingOpp, error:oppErr} = await db.from('opponents')
        .select('id').ilike('name', oppName).limit(1)
      if (!oppErr && existingOpp && existingOpp.length) {
        oppId = existingOpp[0].id
      }
    } catch(e) {}

    if (!oppId) {
      var {data:newOpp, error:newOppErr} = await db.from('opponents')
        .insert({name:oppName}).select('id').single()
      if (newOppErr) throw new Error('Opponent error: ' + newOppErr.message)
      oppId = newOpp.id
    }

    // Create game — only include columns we know exist
    var gameData = {
      team_id:     ACES_CONFIG.teamId,
      opponent_id: oppId,
      game_date:   gameDate,
      season:      (typeof ACES_CONFIG!=='undefined' && ACES_CONFIG.activeSeason) || 'fall2026',
      status:      'scheduled',
      our_score:   0,
      opp_score:   0,
      inning:      1,
      half:        'top',
      outs:        0,
      balls:       0,
      strikes:     0,
    }
    if (tournament) gameData.tournament = tournament
    if (location)   gameData.location   = location
    gameData.is_home = isHome

    // Add base columns if they exist (added via SQL earlier)
    try {
      gameData.base_1b = false
      gameData.base_2b = false
      gameData.base_3b = false
    } catch(e) {}

    var {data:newGame, error:gameErr} = await db.from('games')
      .insert(gameData).select('id').single()
    console.log('Game insert result:', newGame, gameErr)
    if (gameErr) throw new Error('Game error: ' + gameErr.message)

    document.getElementById('new-game-modal').style.display = 'none'
    await refreshGamesList()
    document.getElementById('game-sel').value = newGame.id
    gameId = newGame.id
    document.getElementById('nav-game-name').textContent =
      oppName + ' · ' + new Date(gameDate).toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'UTC'})
    initDefaultLineup()
    showToast('Game created ✓ Set your lineup!')

  } catch(e) {
    console.error('Create game error:', e)
    var msg = e.message || 'Unknown error'
    showToast(msg.substring(0, 60))
  }
}

function initDefaultLineup() {
  acesLineup = []
  for (var i=1; i<=9; i++) acesLineup.push({playerId:'',playerName:'',jerseyNum:'',position:'',battingOrder:i})
  renderAcesLineup()
}

function populateRosterSelects() {
  // Rebuild all existing selects
  document.querySelectorAll('.player-sel').forEach(function(sel) {
    var cur = sel.value
    sel.innerHTML = playerOptions()
    sel.value = cur
  })
  var sp = document.getElementById('starter-pitcher')
  if(sp){ sp.innerHTML = '<option value="">Select pitcher...</option>'+playerOptions(); sp.value=starterPitcherId||'' }
}

function playerOptions() {
  return '<option value="">— Select player —</option>' +
    roster.map(function(p){
      return '<option value="'+p.id+'">#'+p.jersey_num+' '+p.first_name+' '+p.last_name+'</option>'
    }).join('')
}

function renderAcesLineup() {
  var list = document.getElementById('lineup-list')
  list.innerHTML = ''
  acesLineup.forEach(function(entry, idx) {
    var row = document.createElement('div')
    row.className = 'lineup-row'
    row.dataset.idx = idx
    row.innerHTML =
      '<span class="drag-handle">⠿</span>'+
      '<span class="order-num">'+(idx+1)+'</span>'+
      '<select class="player-sel" onchange="setPlayer('+idx+',this.value)">'+
        '<option value="">— Select —</option>'+
        roster.map(function(p){
          return '<option value="'+p.id+'"'+(entry.playerId===p.id?' selected':'')+'>'+
            '#'+p.jersey_num+' '+p.first_name+' '+p.last_name+'</option>'
        }).join('')+
      '</select>'+
      '<select class="pos-sel" onchange="setPos('+idx+',this.value)">'+
        POSITIONS.map(function(p){return '<option value="'+p+'"'+(entry.position===p?' selected':'')+'>'+p+'</option>'}).join('')+
      '</select>'+
      '<button class="row-del" onclick="removeBatter('+idx+')">×</button>'
    list.appendChild(row)
  })
  document.getElementById('batter-count').textContent = '('+acesLineup.length+')'
}

function setPlayer(idx, playerId) {
  var p = roster.find(function(r){return r.id===playerId})
  if(p){
    acesLineup[idx].playerId = p.id
    acesLineup[idx].playerName = p.first_name+' '+p.last_name
    acesLineup[idx].jerseyNum = p.jersey_num
    if(p.positions && p.positions.length) acesLineup[idx].position = p.positions[0]
    renderAcesLineup()
  } else {
    acesLineup[idx].playerId = ''
    acesLineup[idx].playerName = ''
  }
}

function setPos(idx, pos) { acesLineup[idx].position = pos }

function addBatter() {
  acesLineup.push({playerId:'',playerName:'',jerseyNum:'',position:'',battingOrder:acesLineup.length+1})
  renderAcesLineup()
  setTimeout(function(){
    var rows = document.querySelectorAll('.lineup-row')
    rows[rows.length-1].scrollIntoView({behavior:'smooth',block:'center'})
  },100)
}

function removeBatter(idx) {
  if(acesLineup.length<=1)return
  acesLineup.splice(idx,1)
  acesLineup.forEach(function(e,i){e.battingOrder=i+1})
  renderAcesLineup()
}

// OPPONENT
function renderOppLineup() {
  var list = document.getElementById('opp-list')
  list.innerHTML = ''
  oppLineup.forEach(function(entry,idx){
    var row = document.createElement('div')
    row.className = 'opp-row'
    row.innerHTML =
      '<span class="order-num">'+(idx+1)+'</span>'+
      '<input class="opp-inp" style="margin:0;flex:1;" placeholder="Name & number" value="'+(entry.name||'')+'" oninput="oppLineup['+idx+'].name=this.value"/>'+
      '<select class="pos-sel" onchange="oppLineup['+idx+'].position=this.value">'+
        POSITIONS.map(function(p){return '<option value="'+p+'"'+(entry.position===p?' selected':'')+'>'+p+'</option>'}).join('')+
      '</select>'+
      '<button class="row-del" onclick="removeOppBatter('+idx+')">×</button>'
    list.appendChild(row)
  })
}

function addOppBatter() {
  oppLineup.push({name:'',position:'',battingOrder:oppLineup.length+1})
  renderOppLineup()
}

function removeOppBatter(idx) {
  oppLineup.splice(idx,1)
  oppLineup.forEach(function(e,i){e.battingOrder=i+1})
  renderOppLineup()
}

// SUBSTITUTIONS
var subFlow = {type:null, outIdx:null}

function openSubModal(type) {
  subFlow = {type:type, outIdx:null}
  var body = document.getElementById('sub-modal-body')

  if(type==='pitching-change') {
    document.getElementById('sub-modal-title').textContent = 'Select new pitcher'
    renderBenchStep(body)
  } else {
    // Step 1: which batting-order slot is coming out
    document.getElementById('sub-modal-title').textContent = "Who's coming out?"
    var filled = acesLineup.filter(function(e){return e.playerId})
    if(!filled.length) {
      body.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:12px;padding:20px 0;text-align:center;">No lineup set yet</div>'
    } else {
      body.innerHTML = acesLineup.map(function(e, idx){
        if(!e.playerId) return ''
        return '<div class="sub-option" onclick="chooseSubOut('+idx+')">'+
          '<span class="sub-num">'+(idx+1)+'</span>'+
          '<div><div class="sub-name">'+e.playerName+'</div>'+
          '<div class="sub-pos">'+(e.position||'')+'</div></div>'+
        '</div>'
      }).join('')
    }
  }
  document.getElementById('sub-modal').style.display = 'flex'
}

function chooseSubOut(idx) {
  subFlow.outIdx = idx
  var outgoing = acesLineup[idx]
  document.getElementById('sub-modal-title').textContent = 'Who\'s coming in for #'+outgoing.jerseyNum+' '+outgoing.playerName+'?'
  renderBenchStep(document.getElementById('sub-modal-body'))
}

function renderBenchStep(body) {
  // Show bench players (not currently in lineup)
  var inLineup = acesLineup.map(function(e){return e.playerId}).filter(Boolean)
  var bench = roster.filter(function(p){return !inLineup.includes(p.id)})

  if(!bench.length) {
    body.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:12px;padding:20px 0;text-align:center;">No bench players available</div>'
  } else {
    body.innerHTML = bench.map(function(p){
      return '<div class="sub-option" onclick="makeSub(\''+p.id+'\',\''+(p.first_name+' '+p.last_name).replace(/'/g,"\\'")+'\','+p.jersey_num+')">'+
        '<span class="sub-num">#'+p.jersey_num+'</span>'+
        '<div><div class="sub-name">'+p.first_name+' '+p.last_name+'</div>'+
        '<div class="sub-pos">'+(p.positions||[]).join(', ')+'</div></div>'+
        '<span class="sub-badge">Bench</span>'+
      '</div>'
    }).join('')
  }
}

function closeSubModal(e) {
  if(!e||e.target.id==='sub-modal') document.getElementById('sub-modal').style.display='none'
}

async function makeSub(playerId, playerName, jerseyNum) {
  var type = subFlow.type
  var time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})
  closeSubModal()

  if(type==='pitching-change') {
    // Mound assignment only — doesn't touch the batting order. If the new
    // pitcher also needs to enter the batting order (rather than just
    // pitching), record that separately as a pinch-hit/pinch-run sub too.
    starterPitcherId = playerId
    document.getElementById('starter-pitcher').value = playerId
    subsLog.push({type:type, playerId:playerId, playerName:playerName, jerseyNum:jerseyNum, time:time})
    showToast('#'+jerseyNum+' '+playerName+' now pitching')
  } else {
    var idx = subFlow.outIdx
    if(idx==null || !acesLineup[idx]) { showToast('Select a batting slot first'); return }
    var outgoing = {playerName:acesLineup[idx].playerName, jerseyNum:acesLineup[idx].jerseyNum}
    // Actually swap the player into the batting order — this is what
    // score.html reads, so the sub takes effect for real, not just in the log.
    setPlayer(idx, playerId)
    subsLog.push({
      type:type, playerId:playerId, playerName:playerName, jerseyNum:jerseyNum, time:time,
      outPlayerName:outgoing.playerName, outJerseyNum:outgoing.jerseyNum, battingSlot:idx+1
    })
    showToast('#'+jerseyNum+' '+playerName+' in for #'+outgoing.jerseyNum+' '+outgoing.playerName+' (slot '+(idx+1)+')')
  }
  renderSubsLog()
  // Save immediately — the scorer tablet may already be mid-game and needs
  // this change right away, not whenever the coach next remembers to hit Save.
  await saveLineup()
}

function renderSubsLog() {
  var list = document.getElementById('subs-list')
  if(!subsLog.length){
    list.innerHTML='<div style="color:var(--muted);font-family:var(--mono);font-size:12px;padding:20px 0;text-align:center;">No substitutions yet</div>'
    return
  }
  list.innerHTML = subsLog.map(function(s){
    var detail = s.outPlayerName ? ('In for #'+s.outJerseyNum+' '+s.outPlayerName+(s.battingSlot?(' · slot '+s.battingSlot):'')) : ''
    return '<div style="background:var(--dark2);border:1px solid var(--bdr);border-radius:9px;padding:10px 12px;margin-bottom:8px;">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;">'+
        '<span style="font-family:var(--mono);font-size:10px;color:var(--orange);text-transform:uppercase;">'+s.type.replace(/-/g,' ')+'</span>'+
        '<span style="font-family:var(--mono);font-size:10px;color:var(--muted);">'+s.time+'</span>'+
      '</div>'+
      '<div style="font-size:14px;font-weight:500;margin-top:4px;">#'+s.jerseyNum+' '+s.playerName+'</div>'+
      (detail?'<div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px;">'+detail+'</div>':'')+
    '</div>'
  }).join('')
}

// SAVE / LOAD
async function saveLineup() {
  if(!gameId){showToast('Select a game first');return}

  var payload = {
    aces_lineup: acesLineup,
    aces_pitcher_id: document.getElementById('starter-pitcher').value||null,
    opp_lineup: oppLineup,
    opp_pitcher: document.getElementById('opp-pitcher').value,
    subs_log: subsLog
  }

  // Store in games table notes field (or a dedicated lineups table if you add one)
  try {
    await db.from('games').update({notes: JSON.stringify(payload)}).eq('id', gameId)
    showToast('Lineup saved ✓')
  } catch(e) { showToast('Save failed — check connection') }
}

async function loadLineup() {
  gameId = document.getElementById('game-sel').value
  if(!gameId) return
  var sel = document.getElementById('game-sel')
  document.getElementById('nav-game-name').textContent = sel.options[sel.selectedIndex].text

  try {
    var {data} = await db.from('games').select('notes').eq('id',gameId).single()
    if(data?.notes) {
      var saved = JSON.parse(data.notes)
      acesLineup = saved.aces_lineup || []
      oppLineup  = saved.opp_lineup  || []
      subsLog    = saved.subs_log    || []
      if(saved.aces_pitcher_id) {
        document.getElementById('starter-pitcher').value = saved.aces_pitcher_id
        starterPitcherId = saved.aces_pitcher_id
      }
      if(saved.opp_pitcher) document.getElementById('opp-pitcher').value = saved.opp_pitcher
      renderAcesLineup(); renderOppLineup(); renderSubsLog()
      showToast('Lineup loaded')
      return
    }
  } catch(e) {}
  initDefaultLineup()
  oppLineup = []; renderOppLineup()
}

function goToScorer() {
  if(gameId) window.location = 'score.html?game='+gameId
  else window.location = 'score.html'
}

function switchTab(tab) {
  currentTab = tab
  ;['aces','opp','subs'].forEach(function(t){
    document.getElementById('tab-'+t).className='tab'+(t===tab?' active':'')
    document.getElementById('pane-'+t).style.display=t===tab?'':'none'
  })
}

function showToast(msg) {
  var t=document.getElementById('toast')
  t.textContent=msg; t.classList.add('show')
  setTimeout(function(){t.classList.remove('show')},2200)
}

// Add notes column to games if missing (run once)
async function ensureNotesColumn() {
  try { await db.from('games').select('notes').limit(1) }
  catch(e) {
    // Column doesn't exist — need to add via SQL editor
    console.log('Add notes column: ALTER TABLE games ADD COLUMN IF NOT EXISTS notes text;')
  }
}

init()
ensureNotesColumn()
