<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Aces Scorer"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <meta name="theme-color" content="#E8530A"/>
<title>Aces · Scorer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap');
:root{
  --orange:#E8530A;--og:rgba(232,83,10,.15);--black:#0A0C0E;
  --dark:#111418;--dark2:#181C22;--dark3:#1F242C;
  --bdr:rgba(255,255,255,.08);--bdr-a:rgba(232,83,10,.4);
  --text:#F0EDE8;--muted:#7A8290;--green:#3DDC6A;
  --mono:'Roboto Mono',monospace;--display:'Oswald',sans-serif;--body:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{background:var(--black);color:var(--text);font-family:var(--body);min-height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ── SETUP ── */
.setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:0;}
.setup-logo{font-family:var(--display);font-size:40px;font-weight:700;color:var(--orange);margin-bottom:4px;}
.setup-sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:28px;}
.setup-card{background:var(--dark2);border:1px solid var(--bdr);border-radius:14px;padding:20px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px;}
.field-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.field-sel{width:100%;background:var(--dark3);border:1px solid var(--bdr);border-radius:8px;padding:11px 12px;color:var(--text);font-size:14px;font-family:var(--body);outline:none;appearance:none;}
.field-sel:focus{border-color:var(--orange);}
.field-inp{width:100%;background:var(--dark3);border:1px solid var(--bdr);border-radius:8px;padding:11px 12px;color:var(--text);font-size:14px;font-family:var(--body);outline:none;}
.field-inp:focus{border-color:var(--orange);}
.setup-btn{width:100%;background:var(--orange);color:white;border:none;border-radius:10px;padding:15px;font-family:var(--display);font-size:18px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;margin-top:4px;}
.setup-btn:active{opacity:.85;}

/* ── SCORER LAYOUT ── */
.scorer{display:none;flex-direction:column;min-height:100vh;}

/* top bar — sticky so always visible */
.top-bar{background:#0d1420;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:40;}
.top-game{font-family:var(--display);font-size:14px;font-weight:600;color:var(--text);line-height:1.2;}
.top-meta{font-family:var(--mono);font-size:10px;color:var(--muted);}
.top-right{display:flex;align-items:center;gap:10px;}
.score-pill{display:flex;align-items:center;gap:6px;background:var(--dark3);border:1px solid var(--bdr);border-radius:8px;padding:4px 10px;}
.score-pill .s-num{font-family:var(--display);font-size:22px;font-weight:700;color:var(--orange);line-height:1;}
.score-pill .s-sep{font-family:var(--display);font-size:14px;color:var(--muted);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite;flex-shrink:0;}
.sync-dot.err{background:#e74c3c;animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* count bar — sticky below top bar */
.count-bar{background:var(--dark2);padding:6px 14px;display:flex;align-items:center;border-bottom:1px solid var(--bdr);flex-shrink:0;position:sticky;top:50px;z-index:39;}
.bso-grp{display:flex;align-items:center;gap:5px;margin-right:12px;}
.bso-lbl{font-family:var(--mono);font-size:11px;color:var(--muted);width:10px;}
.pip{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.15);background:transparent;cursor:pointer;transition:background .1s;}
.pip.b-on{background:#1a7ac4;border-color:#1a7ac4;}
.pip.s-on{background:#e74c3c;border-color:#e74c3c;}
.pip.o-on{background:#666;border-color:#555;}
.inning-lbl{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;}

/* field + info row */
.mid-row{display:flex;align-items:stretch;gap:0;flex-shrink:0;border-bottom:1px solid var(--bdr);}

/* field svg */
.field-wrap{background:#0A0C0E;padding:10px 10px 6px;flex-shrink:0;}

/* at-bat info panel */
.ab-panel{flex:1;background:var(--dark);padding:10px 12px;display:flex;flex-direction:column;justify-content:space-between;}
.ab-section{margin-bottom:6px;}
.ab-micro{font-family:var(--mono);font-size:9px;color:var(--orange);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}
.ab-name{font-size:14px;font-weight:500;color:var(--text);}
.ab-sub{font-size:11px;color:var(--muted);}

/* velo row */
.velo-row{display:flex;align-items:center;gap:8px;background:var(--dark2);border-radius:8px;padding:6px 10px;margin-top:6px;}
.velo-val{font-family:var(--display);font-size:22px;font-weight:700;color:var(--orange);min-width:44px;text-align:center;cursor:pointer;line-height:1;}
.velo-unit{font-family:var(--mono);font-size:10px;color:var(--muted);}
.velo-nudge{width:34px;height:34px;border-radius:7px;border:1px solid var(--bdr);background:var(--dark3);color:var(--text);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.velo-nudge:active{background:var(--dark2);}
.velo-type-row{display:flex;gap:4px;margin-top:6px;}
.vt-btn{flex:1;padding:9px 2px;font-family:var(--mono);font-size:12px;font-weight:500;border:1px solid var(--bdr);border-radius:6px;background:var(--dark3);color:var(--muted);cursor:pointer;text-align:center;}
.vt-btn.sel{background:#1a2332;color:white;border-color:#E8530A;}
.vt-btn:active{opacity:.8;}

/* result buttons */
.result-area{display:flex;flex-direction:column;gap:8px;padding:10px 12px;}
.result-row-top{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px;}
.result-row-bot{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.rb-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;border:1.5px solid;cursor:pointer;font-family:var(--body);font-weight:500;transition:opacity .1s;-webkit-tap-highlight-color:transparent;min-height:52px;}
.rb-btn:active{opacity:.75;}
.rb-btn .rb-icon{font-family:var(--display);font-size:22px;font-weight:700;line-height:1;}
.rb-btn .rb-lbl{font-size:11px;margin-top:2px;opacity:.85;}
.rb-ball{background:rgba(26,122,196,.15);border-color:#1a7ac4;color:#4da8e8;}
.rb-strike{background:rgba(232,83,10,.12);border-color:#E8530A;color:#f07040;}
.rb-foul{background:rgba(186,117,23,.12);border-color:#BA7517;color:#d4a042;}
.rb-inplay{background:rgba(61,220,106,.1);border-color:#27ae60;color:#3DDC6A;}
.rb-out{background:rgba(102,102,102,.12);border-color:#555;color:#999;}
.rb-walk{background:rgba(127,119,221,.12);border-color:#7F77DD;color:#a09cf0;}
.rb-base{background:rgba(232,83,10,.08);border-color:#444;color:var(--muted);}

/* bottom bar — sticky to bottom */
.bot-bar{background:var(--dark2);border-top:1px solid var(--bdr);padding:8px 12px;display:flex;gap:8px;position:sticky;bottom:0;z-index:40;}
.bot-btn{flex:1;padding:12px 4px;font-size:12px;font-weight:500;border:1px solid var(--bdr);border-radius:8px;background:var(--dark3);color:var(--muted);cursor:pointer;text-align:center;}
.bot-btn:active{opacity:.8;}
.bot-btn.danger{border-color:#e74c3c;color:#e74c3c;}
.bot-btn.end{border-color:var(--orange);color:var(--orange);}
.bot-btn.next{background:var(--orange);color:white;border-color:var(--orange);font-weight:600;}

/* iPad Pro landscape — two column layout */
@media(min-width:1024px){
  .scorer-body{display:grid;grid-template-columns:220px 1fr;align-items:start;}
  .mid-row{flex-direction:column;border-bottom:none;border-right:1px solid var(--bdr);}
  .field-wrap{padding:12px;}
  .ab-panel{padding:12px;}
  .result-area{padding:12px 16px;}
  .result-row-top{gap:10px;}
  .result-row-bot{gap:10px;}
  .rb-btn{min-height:72px;}
  .rb-btn .rb-icon{font-size:28px;}
  .rb-btn .rb-lbl{font-size:13px;}
}

/* numpad sheet */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:flex-end;}
.numpad-sheet{background:var(--dark2);border-radius:20px 20px 0 0;padding:16px 16px 32px;width:100%;max-width:400px;margin:0 auto;}
.numpad-title{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;text-align:center;}
.numpad-display{font-family:var(--display);font-size:36px;font-weight:700;color:var(--orange);text-align:center;min-height:44px;margin-bottom:12px;}
.numpad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.np-btn{padding:14px 4px;font-size:20px;font-weight:500;border:1px solid var(--bdr);border-radius:10px;background:var(--dark3);color:var(--text);cursor:pointer;text-align:center;font-family:var(--body);}
.np-btn:active{background:var(--dark);}
.np-clr{font-size:14px;color:var(--muted);}
.np-ok{background:var(--orange)!important;color:white!important;border-color:var(--orange)!important;font-size:16px!important;}

/* outcome modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:flex-end;}
.modal-sheet{background:var(--dark2);border-radius:20px 20px 0 0;padding:16px 16px 36px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-family:var(--display);font-size:18px;font-weight:600;color:var(--text);}
.modal-close{font-size:22px;color:var(--muted);background:none;border:none;cursor:pointer;line-height:1;padding:4px 8px;}
.modal-section{margin-bottom:14px;}
.modal-sec-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.outcome-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.oc-btn{padding:14px 4px;font-size:13px;font-weight:500;border:1px solid var(--bdr);border-radius:10px;background:var(--dark3);color:var(--text);cursor:pointer;text-align:center;line-height:1.3;}
.oc-btn:active{opacity:.8;}
.oc-hit{border-color:#27ae60;color:#3DDC6A;background:rgba(39,174,96,.08);}
.oc-out{border-color:#555;color:#888;background:rgba(102,102,102,.08);}
.oc-xb{border-color:#E8530A;color:#f07040;background:rgba(232,83,10,.08);}
.clip-tag{font-size:9px;color:var(--muted);display:block;margin-top:3px;}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a2332;border:1px solid var(--orange);color:var(--orange);padding:8px 20px;border-radius:20px;font-family:var(--mono);font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- ── SETUP ── -->
<div class="setup" id="setup">
  <div class="setup-logo">A</div>
  <div class="setup-sub">Delmarva Aces · Scorer</div>
  <div class="setup-card">
    <div>
      <div class="field-lbl">Select game</div>
      <select class="field-sel" id="game-sel"><option value="">Loading...</option></select>
    </div>
    <div>
      <div class="field-lbl">YouTube stream ID <span style="color:#444;">(optional)</span></div>
      <input class="field-inp" id="yt-id" placeholder="e.g. qePhApm8lFA"/>
    </div>
    <button class="setup-btn" onclick="startScoring()">▶ Start Scoring</button>
    <a href="lineup.html" style="display:block;text-align:center;margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:.5px;">Set lineup first →</a>
  </div>
</div>

<!-- ── SCORER ── -->
<div class="scorer" id="scorer">

  <!-- Top bar -->
  <div class="top-bar">
    <div>
      <div class="top-game" id="top-game">Aces vs —</div>
      <div class="top-meta" id="top-meta">Top 1 · 0 outs</div>
    </div>
    <div class="top-right">
      <div class="score-pill">
        <span class="s-num" id="sc-us">0</span>
        <span class="s-sep">–</span>
        <span class="s-num" id="sc-them">0</span>
      </div>
      <div class="sync-dot" id="sync-dot"></div>
    </div>
  </div>

  <!-- Count bar -->
  <div class="count-bar">
    <div class="bso-grp">
      <span class="bso-lbl">B</span>
      <div class="pip" id="b1" onclick="mc('b',0)"></div>
      <div class="pip" id="b2" onclick="mc('b',1)"></div>
      <div class="pip" id="b3" onclick="mc('b',2)"></div>
    </div>
    <div class="bso-grp">
      <span class="bso-lbl">S</span>
      <div class="pip" id="s1" onclick="mc('s',0)"></div>
      <div class="pip" id="s2" onclick="mc('s',1)"></div>
    </div>
    <div class="bso-grp">
      <span class="bso-lbl">O</span>
      <div class="pip" id="o1" onclick="setOuts(1)"></div>
      <div class="pip" id="o2" onclick="setOuts(2)"></div>
      <div class="pip" id="o3" onclick="setOuts(3)"></div>
    </div>
    <div class="inning-lbl" id="inn-lbl">Top 1</div>
    <div style="margin-left:10px;display:flex;gap:4px;">
      <button onclick="adjInn(-1)" style="background:none;border:1px solid var(--bdr);color:var(--muted);border-radius:4px;width:22px;height:22px;cursor:pointer;font-size:12px;">‹</button>
      <button onclick="adjInn(1)"  style="background:none;border:1px solid var(--bdr);color:var(--muted);border-radius:4px;width:22px;height:22px;cursor:pointer;font-size:12px;">›</button>
    </div>
  </div>

  <!-- Field + AB panel + Results -->
  <div class="scorer-body">  <div class="mid-row">
    <div class="field-wrap">
      <svg viewBox="0 0 200 200" width="175" height="175" style="display:block;background:#060c04;">
        <rect width="200" height="200" fill="#1a4a0d"/>
        <rect x="0"   y="0" width="25" height="200" fill="#163008" opacity=".5"/>
        <rect x="25"  y="0" width="25" height="200" fill="#1e5510" opacity=".4"/>
        <rect x="50"  y="0" width="25" height="200" fill="#163008" opacity=".5"/>
        <rect x="75"  y="0" width="25" height="200" fill="#1e5510" opacity=".4"/>
        <rect x="100" y="0" width="25" height="200" fill="#163008" opacity=".5"/>
        <rect x="125" y="0" width="25" height="200" fill="#1e5510" opacity=".4"/>
        <rect x="150" y="0" width="25" height="200" fill="#163008" opacity=".5"/>
        <rect x="175" y="0" width="25" height="200" fill="#1e5510" opacity=".4"/>
        <polygon points="100,185 0,20 0,200" fill="#0d2408"/>
        <polygon points="100,185 200,20 200,200" fill="#0d2408"/>
        <line x1="100" y1="185" x2="0"   y2="20"  stroke="#fff" stroke-width="1" opacity=".4"/>
        <line x1="100" y1="185" x2="200" y2="20"  stroke="#fff" stroke-width="1" opacity=".4"/>
        <circle cx="100" cy="108" r="62" fill="#7a5025"/>
        <polygon points="100,47 150,108 100,168 50,108" fill="#1e5510"/>
        <line x1="100" y1="185" x2="150" y2="108" stroke="#7a5025" stroke-width="7" opacity=".8"/>
        <line x1="150" y1="108" x2="100" y2="47"  stroke="#7a5025" stroke-width="7" opacity=".8"/>
        <line x1="100" y1="47"  x2="50"  y2="108" stroke="#7a5025" stroke-width="7" opacity=".8"/>
        <line x1="50"  y1="108" x2="100" y2="185" stroke="#7a5025" stroke-width="7" opacity=".8"/>
        <circle cx="100" cy="108" r="8" fill="#8B6420"/>
        <circle cx="100" cy="108" r="3" fill="#9a7030"/>
        <rect x="83"  y="176" width="10" height="14" rx="1" fill="none" stroke="#fff" stroke-width=".5" opacity=".4"/>
        <rect x="107" y="176" width="10" height="14" rx="1" fill="none" stroke="#fff" stroke-width=".5" opacity=".4"/>
        <polygon points="100,196 93,189 93,183 107,183 107,189" fill="#e8e8e8" opacity=".9"/>
        <circle id="h1" cx="150" cy="108" r="10" fill="#E8530A" opacity="0"/>
        <circle id="h2" cx="100" cy="47"  r="10" fill="#E8530A" opacity="0"/>
        <circle id="h3" cx="50"  cy="108" r="10" fill="#E8530A" opacity="0"/>
        <rect id="b1b" x="143" y="101" width="14" height="14" rx="2" fill="#e8e8e8" stroke="#aaa" stroke-width=".5" onclick="toggleBase(1)" style="cursor:pointer;" transform="rotate(45,150,108)"/>
        <rect id="b2b" x="93"  y="40"  width="14" height="14" rx="2" fill="#e8e8e8" stroke="#aaa" stroke-width=".5" onclick="toggleBase(2)" style="cursor:pointer;" transform="rotate(45,100,47)"/>
        <rect id="b3b" x="43"  y="101" width="14" height="14" rx="2" fill="#e8e8e8" stroke="#aaa" stroke-width=".5" onclick="toggleBase(3)" style="cursor:pointer;" transform="rotate(45,50,108)"/>
        <g id="r1b" opacity="0" style="transition:opacity .25s;pointer-events:none;">
          <circle cx="150" cy="108" r="7" fill="#E8530A"/>
          <circle cx="150" cy="108" r="2.5" fill="white"/>
        </g>
        <g id="r2b" opacity="0" style="transition:opacity .25s;pointer-events:none;">
          <circle cx="100" cy="47"  r="7" fill="#E8530A"/>
          <circle cx="100" cy="47"  r="2.5" fill="white"/>
        </g>
        <g id="r3b" opacity="0" style="transition:opacity .25s;pointer-events:none;">
          <circle cx="50"  cy="108" r="7" fill="#E8530A"/>
          <circle cx="50"  cy="108" r="2.5" fill="white"/>
        </g>
        <text x="100" y="18"  text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="8" fill="#3a6a2a" font-weight="600">CF</text>
        <text x="22"  y="40"  text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="8" fill="#3a6a2a" font-weight="600">LF</text>
        <text x="178" y="40"  text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="8" fill="#3a6a2a" font-weight="600">RF</text>
        <text x="68"  y="90"  text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="7" fill="#3a6a2a">SS</text>
        <text x="132" y="90"  text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="7" fill="#3a6a2a">2B</text>
        <text x="30"  y="112" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="7" fill="#3a6a2a">3B</text>
        <text x="170" y="112" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="7" fill="#3a6a2a">1B</text>
        <text id="fld-batter" x="100" y="199" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="7" fill="#E8530A" opacity=".9"></text>
      </svg>
    </div>

    <!-- At bat info -->
    <div class="ab-panel">
      <div>
        <div class="ab-section">
          <div class="ab-micro">At bat</div>
          <div class="ab-name" id="ab-batter">—</div>
          <div class="ab-sub" id="ab-stats"></div>
        </div>
        <div class="ab-section">
          <div class="ab-micro">Pitching</div>
          <div class="ab-name" id="ab-pitcher">—</div>
          <div class="ab-sub" id="ab-pc">PC 0</div>
        </div>
      </div>

      <!-- Velo row -->
      <div>
        <div class="velo-row">
          <button class="velo-nudge" onclick="nudgeVelo(-1)">−</button>
          <div style="flex:1;text-align:center;">
            <div class="velo-val" id="velo-val" onclick="openNumpad()">—</div>
            <div class="velo-unit">mph</div>
          </div>
          <button class="velo-nudge" onclick="nudgeVelo(1)">+</button>
        </div>
        <div class="velo-type-row">
          <button class="vt-btn sel" id="vt-FB" onclick="selType('FB')">FB</button>
          <button class="vt-btn" id="vt-CB" onclick="selType('CB')">CB</button>
          <button class="vt-btn" id="vt-SL" onclick="selType('SL')">SL</button>
          <button class="vt-btn" id="vt-CH" onclick="selType('CH')">CH</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Result buttons -->
  <div class="result-area">
    <div class="result-row-top">
      <button class="rb-btn rb-ball" onclick="quickLog('ball')" style="padding:10px 4px;">
        <div class="rb-icon">B</div>

<script>
var SUPABASE_URL      = ACES_CONFIG.supabaseUrl
var SUPABASE_ANON_KEY = ACES_CONFIG.supabaseKey
var db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

var S = {
  gameId:null, game:null,
  balls:0, strikes:0, outs:0,
  inning:1, isTop:true,
  bases:[false,false,false],
  scores:{us:0,them:0},
  pitchCount:0, abNum:0,
  velo:null, pitchType:'FB',
  npInput:'',
  lastPitchId:null,
  // Lineup
  acesLineup:[],        // full lineup array from lineup.html
  currentBatterIdx:0,   // which spot in the order we're on
  currentPitcherId:null,// our pitcher's player ID
  currentPitcherName:'',
  oppPitcher:'',
  oppLineup:[],
  currentOppBatterIdx:0,
  pitcherPitchCount:0   // running count for current pitcher
}

// State history for undo — each entry is a snapshot + DB ids to delete
var HISTORY = []

function saveSnapshot(pitchId, atBatId) {
  HISTORY.push({
    state: JSON.parse(JSON.stringify(S)),
    pitchId: pitchId || null,
    atBatId: atBatId || null
  })
  // Keep last 10 actions
  if (HISTORY.length > 10) HISTORY.shift()
}

var CLIP = ['single','double','triple','home_run','strikeout_looking','strikeout_swinging','walk','hbp','double_play']

var MODALS = {
  inplay:{
    title:'Ball in Play',
    sections:[
      {lbl:'Hit',cls:'oc-xb',items:[{l:'Home Run',v:'home_run'},{l:'Triple',v:'triple'},{l:'Double',v:'double'},{l:'Single',v:'single'},{l:'Infield single',v:'single'},{l:'Bunt single',v:'single'}]},
      {lbl:'Reach base',cls:'oc-hit',items:[{l:'Error',v:'error'},{l:"Fielder's choice",v:'fielders_choice'},{l:'Dropped 3rd',v:'dropped_third'}]},
      {lbl:'Out',cls:'oc-out',items:[{l:'Fly out',v:'flyout'},{l:'Line out',v:'lineout'},{l:'Pop out',v:'popout'},{l:'Sac fly',v:'sac_fly'},{l:'Ground out',v:'groundout'},{l:'Sac bunt',v:'sac_bunt'}]}
    ]
  },
  outk:{
    title:'Out / Strikeout',
    sections:[
      {lbl:'Strikeout',cls:'oc-out',items:[{l:'K looking',v:'strikeout_looking'},{l:'K swinging',v:'strikeout_swinging'},{l:'Dropped 3rd K',v:'dropped_third_k'}]},
      {lbl:'Ground out',cls:'oc-out',items:[{l:'1–3',v:'groundout'},{l:'3u',v:'groundout'},{l:'4–3',v:'groundout'},{l:'5–3',v:'groundout'},{l:'6–3',v:'groundout'},{l:'Double play',v:'double_play'}]}
    ]
  },
  walk:{
    title:'Walk / HBP',
    sections:[
      {lbl:'',cls:'oc-hit',items:[{l:'Walk (BB)',v:'walk'},{l:'Int. walk',v:'intentional_walk'},{l:'HBP',v:'hbp'}]}
    ]
  },
  base:{
    title:'Baserunner event',
    sections:[
      {lbl:'Advance',cls:'oc-hit',items:[{l:'Stolen base',v:'stolen_base'},{l:'WP advance',v:'wp_advance'},{l:'PB advance',v:'pb_advance'},{l:'Balk',v:'balk_advance'}]},
      {lbl:'Out',cls:'oc-out',items:[{l:'Caught stealing',v:'caught_stealing'},{l:'Pickoff 1B',v:'pickoff'},{l:'Pickoff 2B',v:'pickoff'},{l:'Out advancing',v:'out_advancing'}]}
    ]
  }
}

/* ── SETUP ── */
async function init() {
  var today = new Date(); today.setDate(today.getDate()-1)
  var {data} = await db.from('games').select('*,opponents(name)')
    .in('status',['scheduled','live'])
    .gte('game_date', today.toISOString().split('T')[0])
    .order('game_date').limit(10)
  var sel = document.getElementById('game-sel')
  if (!data||!data.length){sel.innerHTML='<option>No upcoming games</option>';return}
  sel.innerHTML = data.map(function(g){
    var opp=g.opponents?.name||'Opponent'
    var d=new Date(g.game_date)
    var ds=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',timeZone:'UTC'})
    return '<option value="'+g.id+'">'+ds+' vs '+opp+'</option>'
  }).join('')
}

async function startScoring() {
  var gid = document.getElementById('game-sel').value
  if(!gid){alert('Select a game');return}
  var {data:g} = await db.from('games').select('*,opponents(name)').eq('id',gid).single()
  S.gameId=gid; S.game=g
  S.scores.us=g.our_score||0; S.scores.them=g.opp_score||0
  S.inning=g.inning||1; S.isTop=g.half!=='bottom'; S.outs=g.outs||0
  await db.from('games').update({status:'live',stream_start_utc:new Date().toISOString()}).eq('id',gid)
  var ytId = document.getElementById('yt-id').value.trim()
  if(ytId) await db.from('games').update({youtube_stream_id:ytId}).eq('id',gid)
  try{
    var {data:last}=await db.from('at_bats').select('ab_num').eq('game_id',gid).order('ab_num',{ascending:false}).limit(1)
    S.abNum=(last&&last.length)?(last[0].ab_num||0):0
  }catch(e){S.abNum=0}

  // ── LOAD LINEUP ──
  if(g.notes) {
    try {
      var saved = JSON.parse(g.notes)
      S.acesLineup = saved.aces_lineup || []
      S.currentPitcherId = saved.aces_pitcher_id || null
      S.oppPitcher = saved.opp_pitcher || ''
      S.oppLineup  = saved.opp_lineup  || []

      // Find pitcher name
      if(S.currentPitcherId && S.acesLineup.length) {
        var pitcherEntry = S.acesLineup.find(function(e){return e.playerId===S.currentPitcherId})
        S.currentPitcherName = pitcherEntry ? pitcherEntry.playerName : ''
      }

      // Figure out where in the order we are based on at_bats already logged
      if(S.abNum > 0 && S.acesLineup.length > 0) {
        S.currentBatterIdx = S.abNum % S.acesLineup.length
      }
    } catch(e) { console.log('Lineup parse error:', e) }
  }

  document.getElementById('setup').style.display='none'
  document.getElementById('scorer').style.display='flex'
  var opp=g.opponents?.name||'Opponent'
  document.getElementById('top-game').textContent='Aces vs '+opp
  renderAll()
  updateBatterDisplay()
  showToast('Game on! ⚾')
}

/* ── LINEUP DISPLAY ── */
function updateBatterDisplay() {
  if (S.isTop) {
    // Aces batting — show current Aces batter
    var validLineup = S.acesLineup.filter(function(e){return e.playerName})
    if (!validLineup.length) { setText('ab-batter','—'); setText('ab-stats',''); }
    else {
      var idx = S.currentBatterIdx % validLineup.length
      var batter = validLineup[idx]
      setText('ab-batter', batter.playerName || '—')
      setText('ab-stats', (batter.jerseyNum?'#'+batter.jerseyNum:'')+(batter.position?' · '+batter.position:''))
      var fldBatter = document.getElementById('fld-batter')
      if(fldBatter) fldBatter.textContent = batter.playerName ? batter.playerName.split(' ').pop() : ''
    }
  } else {
    // Aces pitching — show opponent batter
    var oppIdx = (S.currentOppBatterIdx||0) % Math.max(1, S.oppLineup ? S.oppLineup.length : 1)
    var oppBatter = S.oppLineup && S.oppLineup.length ? S.oppLineup[oppIdx] : null
    setText('ab-batter', oppBatter ? oppBatter.name : 'Opp. Batter')
    setText('ab-stats', oppBatter ? oppBatter.position : '')
    var fld2 = document.getElementById('fld-batter')
    if(fld2) fld2.textContent = ''
  }
  // Pitcher
  var pitcherName = S.isTop ? (S.oppPitcher||'Opp. Pitcher') : (S.currentPitcherName||'—')
  setText('ab-pitcher', pitcherName)
  setText('ab-pc', 'PC '+S.pitcherPitchCount)
}

function advanceBatter() {
  if(!S.acesLineup.length) return
  S.currentBatterIdx = (S.currentBatterIdx + 1) % S.acesLineup.length
  S.pitchCount = 0  // reset per-batter pitch count
  updateBatterDisplay()
}

function getCurrentBatterId() {
  if(!S.acesLineup.length) return null
  var idx = S.currentBatterIdx % S.acesLineup.length
  return S.acesLineup[idx]?.playerId || null
}

/* ── PITCH LOGGING ── */
async function quickLog(result) {
  // Save state before this pitch for undo
  saveSnapshot(null, null)

  S.pitchCount++
  S.pitcherPitchCount++
  var bBefore=S.balls, sBefore=S.strikes
  var autoWalk=false, autoK=false, autoKLooking=false

  if(result==='ball'){
    S.balls++
    if(S.balls>=4){
      // Walk! Log the pitch then trigger walk AB
      autoWalk=true
    }
  }
  else if(result==='strike_swinging'){
    S.strikes++
    if(S.strikes>=3){
      // Strikeout swinging
      autoK=true
    }
  }
  else if(result==='strike_called'){
    S.strikes++
    if(S.strikes>=3){
      // Strikeout looking
      autoKLooking=true
    }
  }
  else if(result==='foul'){
    // Foul never causes 3rd strike
    if(S.strikes<2) S.strikes++
    // stays at 2 on foul
  }
  else if(result==='in_play'){
    // ball in play — count resets handled by logAB
  }

  var offset=S.game?.stream_start_utc?Math.floor((Date.now()-new Date(S.game.stream_start_utc))/1000):null
  var pd={game_id:S.gameId,
    pitcher_id: !S.isTop ? S.currentPitcherId : null,  // our pitcher only when bottom half
    pitch_num:S.pitchCount,pitch_type:S.pitchType,
    velocity_mph:S.velo,result:result,inning:S.inning,
    half:S.isTop?'top':'bottom',balls_before:bBefore,strikes_before:sBefore,yt_offset_sec:offset}
  try{
    var {data}=await db.from('pitches').insert(pd).select().single()
    S.lastPitchId=data?.id
    // Update the snapshot we saved with the real DB id
    if(HISTORY.length && data?.id) HISTORY[HISTORY.length-1].pitchId = data.id
    setSynced(true)
  }catch(e){setSynced(false)}

  // Auto-trigger outcomes
  if(autoWalk){
    S.balls=0; S.strikes=0
    await pushState(); renderAll()
    await logAB('walk','Walk (BB)', true)
    return
  }
  if(autoK){
    S.balls=0; S.strikes=0
    await pushState(); renderAll()
    await logAB('strikeout_swinging','K swinging', true)
    return
  }
  if(autoKLooking){
    S.balls=0; S.strikes=0
    await pushState(); renderAll()
    await logAB('strikeout_looking','K looking', true)
    return
  }

  await pushState(); renderAll()
}

async function logAB(result, label, skipPitchLog) {
  S.abNum++
  var runs=applyBaserunners(result)
  var isOut=/(strikeout|groundout|flyout|lineout|popout|sac_fly|sac_bunt|double_play|caught_stealing|pickoff|out_advancing|dropped_third_k)/i.test(result)
  var isHit=/(single|double|triple|home_run|walk|hbp|intentional_walk|error|fielders_choice|dropped_third$)/i.test(result)
  if(isOut){
    // Double play = 2 outs
    var outsToAdd = /double_play/i.test(result) ? 2 : 1
    S.outs=Math.min(S.outs+outsToAdd,3)
    S.balls=0;S.strikes=0
  }
  if(isHit){S.balls=0;S.strikes=0}
  // Only log in_play pitch for batted balls, not walks/strikeouts (already logged)
  if(!skipPitchLog && (isHit&&!/(walk|hbp|intentional_walk)/i.test(result)||isOut&&!/(strikeout)/i.test(result))){
    await quickLog('in_play')
  }
  var offset=S.game?.stream_start_utc?Math.floor((Date.now()-new Date(S.game.stream_start_utc))/1000):null
  var abd={
    game_id:S.gameId,
    batter_id: S.isTop ? getCurrentBatterId() : null,  // our batter only when top half
    inning:S.inning,half:S.isTop?'top':'bottom',
    ab_num:S.abNum,result:result,rbi:0,runs_scored:runs,notes:label,
    yt_offset_sec:offset,clip_status:CLIP.includes(result)?'queued':'none'
  }
  try{
    var {data:abd2}=await db.from('at_bats').insert(abd).select().single()
    if(HISTORY.length && abd2?.id) HISTORY[HISTORY.length-1].atBatId = abd2.id
    setSynced(true)
  }catch(e){setSynced(false)}
  if(runs>0){
    var t=S.isTop?'us':'them'
    S.scores[t]+=runs
    showToast(runs===1?'Run scores! 🏃':''+runs+' runs score! 🏃')
  }
  if(CLIP.includes(result)) setTimeout(function(){showToast('📹 Clip queued!')},800)
  // Auto-advance Aces batter when we're hitting (top half)
  if(S.isTop && S.acesLineup.length) advanceBatter()
  // Auto-advance opponent batter when they're hitting (bottom half)
  if(!S.isTop && S.oppLineup.length){
    S.currentOppBatterIdx=(S.currentOppBatterIdx+1)%S.oppLineup.length
    updateBatterDisplay()
  }
  if(S.outs>=3){setTimeout(function(){if(confirm('3 outs — end half?'))newHalf()},300)}
  await pushState(); renderAll()
}

function applyBaserunners(r) {
  var b=S.bases.slice(), runs=0, o=r.toLowerCase()
  if(o==='home_run'){
    runs=(b[0]?1:0)+(b[1]?1:0)+(b[2]?1:0)+1;b=[false,false,false]
  } else if(o==='triple'){
    runs=(b[0]?1:0)+(b[1]?1:0)+(b[2]?1:0);b=[false,false,true]
  } else if(o==='double'){
    runs=(b[1]?1:0)+(b[2]?1:0);b=[false,true,b[0]]
  } else if(o==='single'||o.includes('single')){
    runs=b[2]?1:0;b=[true,b[0],b[1]]
  } else if(o==='walk'||o==='intentional_walk'||o==='hbp'){
    if(b[0]&&b[1]&&b[2]){runs=1;}
    else if(b[0]&&b[1]){b=[true,true,true];}
    else if(b[0]){b=[true,true,b[2]];}
    else{b=[true,b[1],b[2]];}
  } else if(o==='error'||o==='fielders_choice'){
    runs=b[2]?1:0;b=[true,b[0],b[1]]
  } else if(o==='sac_fly'){
    // Runner on 3rd scores, out recorded elsewhere
    runs=b[2]?1:0;if(runs)b[2]=false
  } else if(o==='sac_bunt'){
    // Advance all runners one base
    runs=b[2]?1:0;b=[false,b[0],b[1]];if(runs)b[2]=false
  } else if(o==='double_play'){
    // Remove lead runner, batter is out
    // Most common: runner on 1st → runner moves to 2nd, batter out, one more out
    if(b[0]){b=[false,true,b[2]];}       // 1st only: runner to 2nd, batter out
    else if(b[1]){b=[false,false,b[2]];} // 2nd only: runner out
    else if(b[2]){b=[false,b[1],false];} // 3rd only: runner out
    // outs handled by logAB (adds 2 outs for DP)
  } else if(o==='stolen_base'){
    if(!b[1]&&b[0])b=[false,true,b[2]]
    else if(!b[2]&&b[1])b=[b[0],false,true]
    else if(b[2]){runs=1;b[2]=false}
  } else if(o.includes('wp_advance')||o.includes('pb_advance')||o.includes('balk')){
    runs=b[2]?1:0;b=[b[0],b[0],b[1]];if(runs)b[2]=false
  } else if(o.includes('caught_stealing')||o.includes('pickoff')||o.includes('out_advancing')){
    // Remove the out runner
    if(b[2])b[2]=false;else if(b[1])b[1]=false;else if(b[0])b[0]=false
  } else if(o==='groundout'||o==='flyout'||o==='lineout'||o==='popout'){
    // Batter out, runners hold (may tag up on flyout but simplified)
    if(o==='flyout'&&b[2]){runs=1;b[2]=false} // sac fly situation
  }
  // strikeout, dropped_third_k: bases unchanged
  S.bases=b; return runs
}

async function pushState() {
  if(!S.gameId)return
  try{await db.from('games').update({our_score:S.scores.us,opp_score:S.scores.them,
    inning:S.inning,half:S.isTop?'top':'bottom',outs:S.outs,
    balls:S.balls,strikes:S.strikes}).eq('id',S.gameId)}catch(e){}
}

/* ── VELO ── */
function nudgeVelo(d){
  if(S.velo===null)S.velo=65
  S.velo=Math.max(40,Math.min(105,S.velo+d))
  document.getElementById('velo-val').textContent=S.velo
}
function openNumpad(){
  document.getElementById('np-display').textContent=S.velo||'—'
  S.npInput=''
  document.getElementById('numpad-sheet').style.display='flex'
}
function closeNumpad(e){if(!e||e.target.id==='numpad-sheet')document.getElementById('numpad-sheet').style.display='none'}
function npTap(d){if(S.npInput.length>=3)return;S.npInput+=d;document.getElementById('np-display').textContent=S.npInput}
function npClear(){S.npInput='';document.getElementById('np-display').textContent='—'}
function npConfirm(){
  var v=parseInt(S.npInput)
  if(v&&v>=40&&v<=105){S.velo=v;document.getElementById('velo-val').textContent=v}
  document.getElementById('numpad-sheet').style.display='none'
}
function selType(t){
  S.pitchType=t
  ;['FB','CB','SL','CH'].forEach(function(x){
    document.getElementById('vt-'+x).className='vt-btn'+(x===t?' sel':'')
  })
}

/* ── MODAL ── */
function openModal(type){
  var def=MODALS[type];if(!def)return
  document.getElementById('modal-title').textContent=def.title
  var html=''
  def.sections.forEach(function(sec){
    if(sec.lbl)html+='<div class="modal-section"><div class="modal-sec-lbl">'+sec.lbl+'</div>'
    html+='<div class="outcome-grid">'
    sec.items.forEach(function(item){
      var clip=CLIP.includes(item.v)
      html+='<button class="oc-btn '+sec.cls+'" onclick="pickOutcome(\''+item.v+'\',\''+item.l.replace(/'/g,"\\'")+'\')">'
        +item.l+(clip?'<span class="clip-tag">📹 clip</span>':'')+'</button>'
    })
    html+='</div>'
    if(sec.lbl)html+='</div>'
  })
  document.getElementById('modal-body').innerHTML=html
  document.getElementById('modal-overlay').style.display='flex'
}
function closeModal(e){if(!e||e.target.id==='modal-overlay')document.getElementById('modal-overlay').style.display='none'}
function pickOutcome(v,l){
  document.getElementById('modal-overlay').style.display='none'
  // Walks/HBP from modal: pitch already logged as in_play, skip double logging
  var skipPitch = /(walk|hbp|intentional_walk)/i.test(v)
  logAB(v,l,skipPitch)
}

/* ── CONTROLS ── */
function toggleBase(b){S.bases[b-1]=!S.bases[b-1];renderBases()}
function setOuts(n){S.outs=S.outs===n?n-1:n;renderCount()}
function mc(t,i){
  if(t==='b')S.balls=S.balls===i+1?i:i+1
  else if(t==='s')S.strikes=S.strikes===i+1?i:i+1
  renderCount()
}
function adjInn(d){S.inning=Math.max(1,S.inning+d);renderCount()}
function adjScore(t,d){S.scores[t]=Math.max(0,S.scores[t]+d);renderCount();pushState()}

function newBatter(){
  S.balls=0;S.strikes=0;S.pitchCount=0;S.velo=null
  document.getElementById('velo-val').textContent='—'
  renderCount()
  // Note: batter auto-advances after logAB. This button is for manual skip/sub only.
  // Manually advance if needed:
  if(S.isTop && S.acesLineup.length){
    S.currentBatterIdx=(S.currentBatterIdx+1)%S.acesLineup.length
    updateBatterDisplay()
  }
}
function newHalf(){
  S.balls=0;S.strikes=0;S.outs=0;S.bases=[false,false,false];S.pitchCount=0;S.velo=null
  S.pitcherPitchCount=0
  document.getElementById('velo-val').textContent='—'
  var wasTop = S.isTop
  S.isTop=!S.isTop
  // Inning increments when going from bottom back to top
  if(S.isTop && !wasTop) S.inning++
  // Reset batter index when starting new half
  if(S.isTop) S.currentBatterIdx=0
  pushState();renderAll();showToast((S.isTop?'Top':'Bot')+' '+S.inning+' — batter up!')
}
async function undoLast(){
  if(!HISTORY.length){showToast('Nothing to undo');return}
  var last = HISTORY.pop()

  // Delete from DB
  try{
    if(last.pitchId) await db.from('pitches').delete().eq('id',last.pitchId)
    if(last.atBatId) await db.from('at_bats').delete().eq('id',last.atBatId)
  }catch(e){console.log('undo delete error:',e)}

  // Restore state snapshot (preserve gameId, game, npInput, pitchType, velo)
  var prev = last.state
  S.balls    = prev.balls
  S.strikes  = prev.strikes
  S.outs     = prev.outs
  S.inning   = prev.inning
  S.isTop    = prev.isTop
  S.bases    = prev.bases.slice()
  S.scores   = {us:prev.scores.us, them:prev.scores.them}
  S.pitchCount = prev.pitchCount
  S.abNum    = prev.abNum
  S.lastPitchId = prev.lastPitchId

  await pushState()
  renderAll()
  showToast('Undone ↩')
}
async function endGame(){
  if(!confirm('End game? Final: Aces '+S.scores.us+' – '+S.scores.them))return
  await db.from('games').update({status:'final',our_score:S.scores.us,opp_score:S.scores.them}).eq('id',S.gameId)
  showToast('Game final! ✓')
  setTimeout(function(){window.location='/'},2000)
}

/* ── RENDER ── */
function renderCount(){
  ;[['b1','b2','b3'],['s1','s2'],['o1','o2','o3']].forEach(function(ids,gi){
    var val=[S.balls,S.strikes,S.outs][gi]
    var cls=['b-on','s-on','o-on'][gi]
    ids.forEach(function(id,i){
      var el=document.getElementById(id)
      if(el)el.className='pip'+(i<val?' '+cls:'')
    })
  })
  document.getElementById('sc-us').textContent=S.scores.us
  document.getElementById('sc-them').textContent=S.scores.them
  document.getElementById('top-meta').textContent=(S.isTop?'Top':'Bot')+' '+S.inning+' · '+S.outs+' out'+(S.outs===1?'':'s')
  document.getElementById('inn-lbl').textContent=(S.isTop?'▲':'▼')+' '+S.inning
  document.getElementById('ab-pc').textContent='PC '+S.pitchCount
}
function renderBases(){
  var bases=[{id:'b1b',hid:'h1',rid:'r1b',on:S.bases[0]},
             {id:'b2b',hid:'h2',rid:'r2b',on:S.bases[1]},
             {id:'b3b',hid:'h3',rid:'r3b',on:S.bases[2]}]
  bases.forEach(function(b){
    var be=document.getElementById(b.id)
    var he=document.getElementById(b.hid)
    var re=document.getElementById(b.rid)
    if(be)be.style.fill=b.on?'#E8530A':'#e8e8e8'
    if(he)he.style.opacity=b.on?'0.35':'0'
    if(re)re.style.opacity=b.on?'1':'0'
  })
}
function renderAll(){renderCount();renderBases();updateBatterDisplay()}
function setText(id,val){var el=document.getElementById(id);if(el)el.textContent=val}
function setSynced(ok){document.getElementById('sync-dot').className='sync-dot'+(ok?'':' err')}
function showToast(msg){
  var t=document.getElementById('toast')
  t.textContent=msg;t.classList.add('show')
  setTimeout(function(){t.classList.remove('show')},2200)
}

init()
</script>
