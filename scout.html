<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Opponent Player Scout · Delmarva Aces</title>

<!-- Supabase client (UMD), shared config + PIN gate (coaches only) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
  :root{
    --bg:#020617; --card:rgba(15,23,42,.9); --card-border:#1f2937;
    --accent:#f97316; --accent2:#f59e0b;
    --text:#e5e7eb; --muted:#9ca3af; --danger:#ef4444;
    --pow:#ef476f; --spd:#06d6a0; --gap:#f7b267; --ob:#4895ef;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:1.5rem; color:var(--text);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:radial-gradient(circle at top,#111827 0,#020617 45%,#000 100%);
  }
  h1,h2,h3{margin:0;font-weight:600}
  a{color:inherit}

  .nav{display:flex;align-items:center;justify-content:space-between;
    padding:.75rem 1.25rem;margin-bottom:1.25rem;border-radius:.9rem;
    background:radial-gradient(circle at top left,#111827 0,#020617 50%,#000 100%);
    border:1px solid rgba(15,23,42,.9);box-shadow:0 18px 40px rgba(15,23,42,.9)}
  .nav-left{display:flex;align-items:center;gap:.75rem}
  .nav-logo{width:2.1rem;height:2.1rem;border-radius:.9rem;display:flex;align-items:center;
    justify-content:center;font-weight:800;font-size:.9rem;color:#020617;
    background:radial-gradient(circle at 30% 0%,#fed7aa 0,#f97316 45%,#b45309 100%);
    box-shadow:0 0 0 1px rgba(15,23,42,.9),0 10px 25px rgba(0,0,0,.8)}
  .nav-title-main{font-size:.9rem;text-transform:uppercase;letter-spacing:.08em;color:#f9fafb}
  .nav-title-sub{font-size:.8rem;color:var(--muted)}
  .nav-links{display:flex;gap:.6rem;font-size:.85rem}
  .nav-link{display:inline-flex;align-items:center;padding:.3rem .9rem;border-radius:999px;
    border:1px solid transparent;text-decoration:none;color:var(--muted);white-space:nowrap;
    transition:background .15s,color .15s,border-color .15s}
  .nav-link:hover{border-color:#374151;color:#f9fafb}
  .nav-link-active{background:linear-gradient(to right,#f97316,#f59e0b);color:#020617;font-weight:600;
    box-shadow:0 8px 20px rgba(249,115,22,.35)}

  .layout{display:grid;grid-template-columns:minmax(0,2.3fr) minmax(300px,1fr);gap:1rem;align-items:flex-start}
  @media(max-width:1100px){.layout{grid-template-columns:minmax(0,1fr)}}
  .card{background:var(--card);border-radius:.9rem;border:1px solid var(--card-border);padding:1rem 1.25rem}
  .card-header h2{font-size:1.05rem}
  .card-subtitle{font-size:.8rem;color:var(--muted);margin-top:.15rem}

  .filters{display:flex;flex-wrap:wrap;gap:.75rem;align-items:flex-end;margin:.9rem 0 .4rem}
  .fld{display:flex;flex-direction:column;gap:.25rem}
  .fld label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  select,input[type=number],input[type=text]{padding:.4rem .6rem;border-radius:.5rem;border:1px solid #4b5563;
    background:#020617;color:var(--text);font-size:.85rem;min-width:170px}
  input[type=number]{min-width:80px;max-width:90px}
  select:focus,input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .chk{display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--muted);
    padding:.45rem .6rem;border:1px solid #374151;border-radius:.5rem;background:#020617}
  button{padding:.45rem .9rem;border:0;border-radius:.5rem;cursor:pointer;font-weight:600;font-size:.85rem}
  #btnLoad{background:linear-gradient(to right,#f97316,#f59e0b);color:#020617}
  #btnReset{background:#1f2937;color:var(--text)}
  #meta{font-size:.75rem;color:var(--muted);white-space:pre-wrap;margin:.3rem 0}
  #err{color:var(--danger);font-size:.8rem;margin:.3rem 0;white-space:pre-wrap}

  .tbl-wrap{max-height:70vh;overflow:auto;border:1px solid #1f2937;border-radius:.6rem;margin-top:.4rem}
  table{width:100%;border-collapse:collapse;font-size:.8rem}
  th,td{padding:.4rem .5rem;text-align:right;border-bottom:1px solid #1f2937;white-space:nowrap}
  th:first-child,td:first-child,th:nth-child(2),td:nth-child(2){text-align:left}
  thead th{position:sticky;top:0;background:#0b1327;color:var(--muted);font-size:.72rem;
    cursor:pointer;user-select:none;text-transform:uppercase;letter-spacing:.03em}
  thead th:hover{color:#f9fafb}
  tbody tr:nth-child(even){background:rgba(15,23,42,.55)}
  tbody tr:hover{background:rgba(249,115,22,.08)}
  td.rank{color:var(--muted);text-align:center}
  td.player{font-weight:600;color:#f9fafb}
  td.score{font-weight:700;color:var(--accent2)}

  .flags{display:flex;gap:.25rem;justify-content:flex-end;flex-wrap:wrap}
  .flag{font-size:.62rem;font-weight:700;letter-spacing:.03em;padding:.05rem .4rem;border-radius:999px;border:1px solid}
  .flag.pow{border-color:rgba(239,71,111,.55);color:rgba(239,71,111,.95);background:rgba(239,71,111,.1)}
  .flag.spd{border-color:rgba(6,214,160,.55);color:rgba(6,214,160,.95);background:rgba(6,214,160,.1)}
  .flag.gap{border-color:rgba(247,178,103,.55);color:rgba(247,178,103,.95);background:rgba(247,178,103,.1)}
  .flag.ob{border-color:rgba(72,149,239,.55);color:rgba(72,149,239,.95);background:rgba(72,149,239,.1)}

  .barrow{margin-bottom:.7rem}
  .barhead{display:flex;justify-content:space-between;align-items:baseline;gap:.5rem}
  .barname{font-size:.82rem;font-weight:600;color:#f9fafb}
  .barval{font-size:.72rem;color:var(--accent2);font-weight:700}
  .bar{height:8px;border-radius:999px;background:#0b1327;margin-top:.3rem;overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(to right,#f97316,#f59e0b)}
  .barmeta{font-size:.68rem;color:var(--muted);margin-top:.2rem}
  .legend{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.6rem;font-size:.68rem;color:var(--muted)}
  .muted{color:var(--muted)}

  /* player drill-in slide-over */
  #backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40}
  #backdrop.open{opacity:1;pointer-events:auto}
  #drawer{position:fixed;top:0;right:0;height:100vh;width:min(480px,94vw);background:#0b1327;border-left:1px solid var(--card-border);
    transform:translateX(100%);transition:transform .25s ease;z-index:50;display:flex;flex-direction:column;box-shadow:-20px 0 60px rgba(0,0,0,.65)}
  #drawer.open{transform:translateX(0)}
  .drawer-head{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--card-border)}
  .drawer-head h3{font-size:1.05rem;color:#f9fafb}
  .drawer-close{background:#1f2937;color:var(--text);border:0;border-radius:.5rem;width:2rem;height:2rem;font-size:1.2rem;line-height:1;cursor:pointer}
  #drawerBody{overflow:auto;padding:1rem 1.25rem}
  .drill-summary{font-size:.85rem;color:var(--accent2);font-weight:700;margin-bottom:.7rem}
  .spark-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:.2rem 0 .3rem}
  .spark{width:100%;height:46px;display:block;margin-bottom:1rem}
  .drill-tbl{width:100%;border-collapse:collapse;font-size:.78rem}
  .drill-tbl th{position:sticky;top:0;background:#0b1327;color:var(--muted);text-align:right;padding:.35rem .4rem;font-size:.66rem;text-transform:uppercase}
  .drill-tbl th:first-child{text-align:left}
  .drill-tbl td{text-align:right;padding:.35rem .4rem;border-bottom:1px solid #1f2937}
  .drill-tbl tr:hover td{background:rgba(249,115,22,.06)}
  .drill-tbl td.gcell{text-align:left;white-space:nowrap;color:#e5e7eb}
  .drill-tbl td.hot{color:var(--accent2);font-weight:700}
  .res{font-size:.64rem;padding:.02rem .3rem;border-radius:4px;border:1px solid #374151;color:var(--muted);margin-left:.35rem}
  .res.w{border-color:rgba(6,214,160,.5);color:#6ee7b7}
  .res.l{border-color:rgba(239,71,111,.5);color:#fca5a5}
</style>
</head>

<body>
<header class="nav">
  <div class="nav-left">
    <a href="/"><div class="nav-logo">AC</div></a>
    <div>
      <div class="nav-title-main">Delmarva Aces</div>
      <div class="nav-title-sub">Opponent Scouting</div>
    </div>
  </div>
  <nav class="nav-links">
    <a href="/" class="nav-link">Home</a>
    <span class="nav-link nav-link-active">Player Scout</span>
    <a href="/pitching-scout.html" class="nav-link">Pitching</a>
    <a href="/threat-board.html" class="nav-link">Threat Board</a>
  </nav>
</header>

<main class="layout">
  <section class="card">
    <div class="card-header">
      <h2>Opponent Player Scout</h2>
      <div class="card-subtitle">Ranks a team's hitters by ScoutScore (OPS, power, gap, speed &amp; volume).</div>
    </div>

    <div class="filters">
      <div class="fld"><label>Tournament</label><select id="tournament"></select></div>
      <div class="fld"><label>Team</label><select id="team"></select></div>
      <div class="fld"><label>Level</label>
        <select id="level"><option value="ALL">ALL</option><option>10U</option><option>11U</option><option>12U</option><option>13U</option></select>
      </div>
      <div class="fld"><label>Min AB</label><input id="minAb" type="number" min="0" value="0"/></div>
      <div class="fld"><label>Sort</label>
        <select id="sortSel">
          <option value="score">ScoutScore</option>
          <option value="OPS">OPS</option>
          <option value="AB">AB</option>
          <option value="AVG">AVG</option>
          <option value="HR">HR</option>
          <option value="SB">SB</option>
          <option value="XBH">XBH</option>
        </select>
      </div>
      <div class="fld"><label>Search</label><input id="q" type="text" placeholder="name / number"/></div>
      <label class="chk"><input id="combinePlayers" type="checkbox" checked/> Combine</label>
      <button id="btnLoad">Load Players</button>
      <button id="btnReset">Reset</button>
    </div>

    <div id="meta"></div>
    <div id="err"></div>

    <div class="tbl-wrap">
      <table>
        <thead><tr id="hdr"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </section>

  <aside class="card">
    <div class="card-header">
      <h2>Who to look out for</h2>
      <div class="card-subtitle">Top 8 by ScoutScore (after filters).</div>
    </div>
    <div id="watchList" style="margin-top:.8rem"></div>
    <div class="legend">
      <span><b style="color:var(--pow)">POWER</b> HR≥2</span>
      <span><b style="color:var(--spd)">SPEED</b> SB≥5</span>
      <span><b style="color:var(--gap)">GAP</b> XBH≥3</span>
      <span><b style="color:var(--ob)">ON-BASE</b> AVG≥.450</span>
    </div>
  </aside>
</main>

<div id="backdrop"></div>
<div id="drawer">
  <div class="drawer-head"><h3 id="drawerTitle"></h3><button class="drawer-close" id="drawerClose">×</button></div>
  <div id="drawerBody"></div>
</div>

<script>
(function(){
const db = supabase.createClient(ACES_CONFIG.supabaseUrl, ACES_CONFIG.supabaseKey);
const el = id => document.getElementById(id);
const tournSel=el("tournament"), teamSel=el("team"), levelSel=el("level"),
      minAb=el("minAb"), sortSel=el("sortSel"), searchBox=el("q"), combineEl=el("combinePlayers"),
      hdr=el("hdr"), tbody=el("tbody"), watch=el("watchList"), metaEl=el("meta"), errEl=el("err");

let state={teams:[], players:[], sortKey:"score", sortOrder:"desc"};

const num=v=>{const n=Number(v);return isFinite(n)?n:0;};
const f3=v=>{const n=Number(v);return isFinite(n)?n.toFixed(3):"";};
const norm=s=>String(s||"").toLowerCase().trim();
function setErr(m){errEl.textContent=m||"";}
function teamBaseName(n){return String(n||"").replace(/\s*\(?\d{1,2}\s*[uU]\)?\s*$/,"").replace(/\s+/g," ").trim();}
function playerId(n){return String(n||"").replace(/\s*\([^)]*\)\s*$/,"").replace(/\s+/g," ").trim().toLowerCase();}

// ── exact recovered ScoutScore + flags ───────────────────────────────
function computeScout(r){
  const ab=num(r.AB), h=num(r.H), tb=num(r.TB), hr=num(r.HR), sb=num(r.SB);
  const avg=ab>0?h/ab:0, slg=ab>0?tb/ab:0, ops=avg+slg;
  const xbh=num(r["2B"])+num(r["3B"])+hr;
  let score=ops*100 + hr*18 + xbh*8 + sb*3 + Math.min(ab,40)*0.35;
  const flags=[];
  if(hr>=2) flags.push({key:"POWER",cls:"pow"});
  if(sb>=5) flags.push({key:"SPEED",cls:"spd"});
  if(xbh>=3) flags.push({key:"GAP",cls:"gap"});
  if(avg>=0.450 && ab>=10) flags.push({key:"ON-BASE",cls:"ob"});
  return {ops,score,xbh,flags};
}

function mapRow(r){
  return {pid:r.opp_player_id||"", UniformNumber:r.uniform_number||"", PlayerName:r.player_name||"", Games:r.games||0,
    AB:r.ab||0, H:r.h||0, "2B":r.doubles||0, "3B":r.triples||0, HR:r.hr||0, TB:r.tb||0,
    BB:r.bb||0, SO:r.so||0, SB:r.sb||0, AVG:Number(r.avg)||0, ISO:Number(r.iso)||0};
}
function combineTeams(rows){
  const b=new Map();
  for(const r of rows){
    const base=teamBaseName(r.team_name)||(r.team_name||"").trim()||"Team";
    const k=base.toLowerCase();
    if(!b.has(k)) b.set(k,{display:base,items:[]});
    b.get(k).items.push(r);
  }
  const out=[];
  for(const {display,items} of b.values()){
    const ids=items.map(i=>i.opp_team_id).join(",");
    const lv=[...new Set(items.map(i=>(i.level||"").trim()).filter(Boolean))];
    out.push({ids,team_name:display,level:lv.length===1?lv[0]:(lv.length>1?"MIXED":"")});
  }
  out.sort((a,b)=>a.team_name.toLowerCase().localeCompare(b.team_name.toLowerCase()));
  return out;
}
function combinePlayersRows(rows){
  const m=new Map();
  for(const r of rows){
    const k=playerId(r.PlayerName);
    if(!m.has(k)) m.set(k,{...r});
    else{const a=m.get(k);for(const f of ["Games","AB","H","2B","3B","HR","TB","BB","SO"])a[f]=(a[f]||0)+(r[f]||0);}
  }
  const out=[...m.values()];
  for(const r of out){const ab=r.AB||0;r.AVG=ab?r.H/ab:0;r.ISO=ab?(r.TB-r.H)/ab:0;}
  return out;
}

function val(row,key){
  if(key==="score") return row._s.score;
  if(key==="OPS") return row._s.ops;
  if(key==="XBH") return row._s.xbh;
  return num(row[key]);
}
function sortRows(){
  const k=state.sortKey, asc=state.sortOrder==="asc";
  const strk=(k==="PlayerName"||k==="UniformNumber");
  state.players.sort((a,b)=>{
    if(strk){const va=String(a[k]||"").toLowerCase(),vb=String(b[k]||"").toLowerCase();return asc?va.localeCompare(vb):vb.localeCompare(va);}
    return asc?val(a,k)-val(b,k):val(b,k)-val(a,k);
  });
}

async function loadTournaments(){
  const {data,error}=await db.from("opp_tournaments").select("tournament_code").order("tournament_code");
  if(error) throw error;
  tournSel.innerHTML=`<option value="">ALL</option>`+(data||[]).map(r=>`<option>${r.tournament_code}</option>`).join("");
}
async function loadTeams(){
  const {data,error}=await db.rpc("opp_team_stats",{p_tournament:tournSel.value||null});
  if(error) throw error;
  state.teams=combineTeams(data||[]);
  teamSel.innerHTML=`<option value="">(select team)</option>`+
    state.teams.map(t=>`<option value="${t.ids}">${t.team_name}${t.level?" ("+t.level+")":""}</option>`).join("");
}
async function loadPlayers(){
  setErr("");
  const tv=(teamSel.value||"").trim();
  if(!tv){state.players=[];clearTable("Select a team.");renderWatch();setMeta();return;}
  const ids=tv.split(",").map(s=>s.trim()).filter(Boolean);
  const lvl=(levelSel.value||"ALL").trim();
  try{
    clearTable("Loading…");
    const {data,error}=await db.rpc("opp_player_stats",
      {p_team_ids:ids, p_tournament:tournSel.value||null, p_level:(lvl&&lvl!=="ALL")?lvl:null});
    if(error) throw error;
    let rows=(data||[]).map(mapRow);
    const mn=parseInt(minAb.value||"0",10)||0;
    if(mn>0) rows=rows.filter(r=>(r.AB||0)>=mn);
    if(combineEl.checked) rows=combinePlayersRows(rows);
    for(const r of rows) r._s=computeScout(r);
    state.players=rows;
    sortRows(); render(); renderWatch(); setMeta();
  }catch(e){setErr(e.message||String(e));state.players=[];clearTable("Failed to load.");renderWatch();setMeta();}
}

function setMeta(){
  const t=teamSel.options[teamSel.selectedIndex]?.text||"(none)";
  metaEl.textContent=`Team ${t} · Tournament ${tournSel.value||"ALL"} · Level ${levelSel.value} · MinAB ${minAb.value||0} · ${state.players.length} players`;
}
function clearTable(msg){hdr.innerHTML="";tbody.innerHTML=`<tr><td class="muted" style="padding:14px">${msg||""}</td></tr>`;}

function filtered(){
  const q=norm(searchBox.value);
  if(!q) return state.players.slice();
  return state.players.filter(r=>norm(r.PlayerName).includes(q)||norm(r.UniformNumber).includes(q));
}

const COLS=[
  {k:"rank",label:"#",cls:"rank",noSort:true},
  {k:"PlayerName",label:"Player",cls:"player"},
  {k:"Games",label:"G"},{k:"AB",label:"AB"},{k:"AVG",label:"AVG"},{k:"OPS",label:"OPS"},
  {k:"ISO",label:"ISO"},{k:"HR",label:"HR"},{k:"SB",label:"SB"},{k:"XBH",label:"XBH"},
  {k:"score",label:"Score",cls:"score"},{k:"flags",label:"Flags",noSort:true}
];
function render(){
  const rows=filtered();
  if(!rows.length){clearTable("No players match filters.");return;}
  hdr.innerHTML=COLS.map(c=>{
    const arrow=state.sortKey===c.k?(state.sortOrder==="asc"?" ▲":" ▼"):"";
    return `<th data-k="${c.noSort?"":c.k}">${c.label}${arrow}</th>`;
  }).join("");
  tbody.innerHTML=rows.map((r,i)=>{
    const s=r._s;
    const flags=s.flags.map(f=>`<span class="flag ${f.cls}">${f.key}</span>`).join("");
    return `<tr>
      <td class="rank">${i+1}</td>
      <td class="player">${r.PlayerName||""}</td>
      <td>${r.Games??0}</td><td>${r.AB??0}</td><td>${f3(r.AVG)}</td><td>${f3(s.ops)}</td>
      <td>${f3(r.ISO)}</td><td>${r.HR??0}</td><td>${r.SB??0}</td><td>${s.xbh}</td>
      <td class="score">${s.score.toFixed(1)}</td>
      <td><div class="flags">${flags||'<span class="muted">—</span>'}</div></td>
    </tr>`;
  }).join("");
  hdr.querySelectorAll("th[data-k]").forEach(th=>{
    if(!th.dataset.k) return;
    th.style.cursor="pointer";
    th.onclick=()=>{
      const k=th.dataset.k;
      if(state.sortKey===k) state.sortOrder=state.sortOrder==="asc"?"desc":"asc";
      else{state.sortKey=k;state.sortOrder="desc";}
      sortSel.value=(["score","OPS","AB","AVG","HR","SB","XBH"].includes(k))?k:sortSel.value;
      sortRows();render();setMeta();
    };
  });
  // click a player row -> game-by-game drill-in
  tbody.querySelectorAll("tr").forEach((tr,i)=>{
    const r=rows[i]; if(!r||!r.pid) return;
    tr.style.cursor="pointer";
    tr.onclick=()=>openDrill(r.pid, r.PlayerName);
  });
}
function renderWatch(){
  const rows=filtered().slice().sort((a,b)=>b._s.score-a._s.score).slice(0,8);
  if(!rows.length){watch.innerHTML='<div class="muted">No players yet.</div>';return;}
  const max=Math.max(...rows.map(r=>r._s.score),1);
  watch.innerHTML=rows.map(r=>{
    const s=r._s, pct=Math.max(4,(s.score/max)*100);
    const fl=s.flags.map(f=>f.key).join(" · ")||"—";
    return `<div class="barrow">
      <div class="barhead"><span class="barname">${r.PlayerName||""}</span><span class="barval">${s.score.toFixed(0)}</span></div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="barmeta">OPS ${f3(s.ops)} · AB ${r.AB??0} · ${fl}</div>
    </div>`;
  }).join("");
}

function bind(){
  tournSel.onchange=async()=>{try{await loadTeams();}catch(e){setErr(e.message);}state.players=[];clearTable("Select a team.");renderWatch();setMeta();};
  teamSel.onchange=()=>{state.players=[];clearTable("Click Load Players.");renderWatch();setMeta();};
  levelSel.onchange=setMeta; minAb.onchange=setMeta; combineEl.onchange=setMeta;
  sortSel.onchange=()=>{state.sortKey=sortSel.value;state.sortOrder="desc";if(state.players.length){sortRows();render();}setMeta();};
  searchBox.oninput=()=>{render();renderWatch();setMeta();};
  el("btnLoad").onclick=loadPlayers;
  el("btnReset").onclick=()=>{levelSel.value="ALL";minAb.value="0";searchBox.value="";combineEl.checked=true;
    sortSel.value="score";state.sortKey="score";state.sortOrder="desc";state.players=[];clearTable("Click Load Players.");renderWatch();setMeta();};
}
// ---- player drill-in (game-by-game log) ----
const drawer=el("drawer"), backdrop=el("backdrop"), drawerTitle=el("drawerTitle"), drawerBody=el("drawerBody");
function closeDrill(){ drawer.classList.remove("open"); backdrop.classList.remove("open"); }
el("drawerClose").onclick=closeDrill; backdrop.onclick=closeDrill;
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeDrill(); });
function fmtDate(iso){ if(!iso) return ""; const d=new Date(iso); return isNaN(d)?"":(d.getUTCMonth()+1)+"/"+d.getUTCDate(); }
function shortOpp(n){ return String(n||"").replace(/\s*\(?\d{1,2}\s*[uU]\)?.*$/,"").trim(); }
function gLabel(r){ const p=[]; const dt=fmtDate(r.game_date); if(dt)p.push(dt); if(r.opponent_name)p.push("vs "+shortOpp(r.opponent_name)); return p.join(" ")||"Game"; }
function resBadge(r){ if(r.opp_runs==null||r.aces_runs==null) return ""; const w=r.opp_runs>r.aces_runs,l=r.opp_runs<r.aces_runs;
  return `<span class="res ${w?'w':l?'l':''}">${w?'W':l?'L':'T'} ${r.opp_runs}-${r.aces_runs}</span>`; }
function sparkline(vals){ const max=Math.max(...vals,1),W=320,H=46,n=Math.max(1,vals.length),bw=Math.max(3,(W/n)-3); let b="";
  vals.forEach((v,i)=>{const h=Math.max(2,(v/max)*(H-6)),x=i*(W/n);
    b+=`<rect x="${x.toFixed(1)}" y="${(H-h).toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="1.5" fill="${v>=2?'var(--accent)':'#475569'}"/>`;});
  return `<svg viewBox="0 0 ${W} ${H}" class="spark" preserveAspectRatio="none">${b}</svg>`; }
function renderGameLog(rows){
  if(!rows.length) return '<div class="muted" style="padding:14px">No game log.</div>';
  const tAB=rows.reduce((a,r)=>a+(r.ab||0),0),tH=rows.reduce((a,r)=>a+(r.h||0),0),
        tHR=rows.reduce((a,r)=>a+(r.hr||0),0),tSB=rows.reduce((a,r)=>a+(r.sb||0),0),avg=tAB?tH/tAB:0;
  let html=`<div class="drill-summary">${rows.length} games · ${tH}-for-${tAB} · ${avg.toFixed(3).replace(/^0/,'')} · ${tHR} HR · ${tSB} SB</div>`;
  html+=`<div class="spark-label">Hits per game</div>${sparkline(rows.map(r=>r.h||0))}`;
  html+=`<table class="drill-tbl"><thead><tr><th>Game</th><th>AB</th><th>H</th><th>2B</th><th>3B</th><th>HR</th><th>BB</th><th>SO</th><th>SB</th></tr></thead><tbody>`;
  for(const r of rows){
    html+=`<tr><td class="gcell">${gLabel(r)}${resBadge(r)}</td><td>${r.ab||0}</td>`+
      `<td class="${(r.h||0)>=2?'hot':''}">${r.h||0}</td><td>${r.doubles||0}</td><td>${r.triples||0}</td>`+
      `<td>${(r.hr||0)>0?'<b>'+r.hr+'</b>':0}</td><td>${r.bb||0}</td><td>${r.so||0}</td><td>${r.sb||0}</td></tr>`;
  }
  return html+"</tbody></table>";
}
async function openDrill(pid,name){
  if(!pid) return;
  drawerTitle.textContent=name||"Player";
  drawerBody.innerHTML='<div class="muted" style="padding:14px">Loading game log…</div>';
  backdrop.classList.add("open"); drawer.classList.add("open");
  try{ const {data,error}=await db.rpc("opp_player_game_log",{p_opp_player_id:pid}); if(error) throw error;
    drawerBody.innerHTML=renderGameLog(data||[]);
  }catch(e){ drawerBody.innerHTML='<div style="color:var(--danger);padding:14px">'+(e.message||e)+'</div>'; }
}

async function init(){
  bind(); clearTable("Loading…");
  try{await loadTournaments();await loadTeams();clearTable("Pick a team, then Load Players.");}
  catch(e){setErr("Init failed: "+(e.message||e));clearTable("Failed to load.");}
  renderWatch(); setMeta();
}
init();
})();
</script>
</body>
